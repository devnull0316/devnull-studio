<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>/dev/ad — 誰でも書き込める広告枠</title>
<meta name="description" content="広告枠はずっと読み取り専用だった。/dev/ad は新規タブページに複数の広告枠を持つ実験で、誰でも無料で出稿できる。広告は消えず、保存されるほどよく流れる。みんなで塗る世界地図も1本の広告として巡ってくる。">
<meta name="theme-color" content="#131314">
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%23131314"/><rect x="7" y="20" width="10" height="3.4" rx="1" fill="%23d8d5cc"/><path d="M8 8 L14 13 L8 18" stroke="%23d8d5cc" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'>
<style>
/* ================================================================
   /dev/ad v4 — working prototype (local only, nothing is shared yet)
   New-tab page with several ad slots running at once, over a shared
   world-map pixel board. Same pool renders on other surfaces too.
   ================================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #131314;
  --fg: #e4e2dd;
  --fg-dim: #98968f;
  --fg-faint: #616058;
  --line: #262628;
  --bone: #d8d5cc;
  --bone-ink: #161616;
  --danger: #b4544a;
}

html, body { height: 100%; }

body {
  font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--fg);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
a { color: inherit; }
button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; }
:focus-visible { outline: 1.5px solid var(--bone); outline-offset: 3px; }
::selection { background: rgba(228, 226, 221, 0.2); }
input, textarea, select { font-family: inherit; }

/* ===== app frame ===== */
#app { position: relative; z-index: 2; height: 100dvh; display: flex; flex-direction: column; }

#viewport {
  flex: 1; min-height: 0;
  margin: clamp(10px, 2vh, 20px) clamp(12px, 2.5vw, 28px) 6px;
  border: 1px solid var(--line);
  border-radius: 8px;
  position: relative;
  overflow: hidden;
  background: #0f0f10;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
}

/* ===== A: chrome-extension new-tab runtime — drop the prototype's window-chrome dressing so the
   same HTML reads as a real new tab instead of a demo inside a browser mockup ===== */
.is-ext #nt-tabs, .is-ext #nt-bar, .is-ext #surfbar { display: none; }
.is-ext #viewport {
  margin: 0; border: none; border-radius: 0; box-shadow: none; background: transparent;
}

/* ===== control rows (prototype chrome, outside the mock) ===== */
#surfbar {
  flex: none;
  display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
  gap: 18px;
  padding: 8px 14px 2px;
}
#surfbar .lbl { font-family: ui-monospace, Menlo, monospace; font-size: 9px; letter-spacing: 0.26em; color: var(--fg-faint); margin-right: 2px; }
.surf-chip {
  font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: var(--fg-faint);
  padding: 6px 1px;
  border-bottom: 1px solid transparent;
  transition: color .2s, border-color .2s;
}
.surf-chip:hover { color: var(--fg-dim); }
.surf-chip.sel { color: var(--fg); border-bottom-color: var(--fg); }
#btn-next {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--fg);
  padding: 6px 1px; margin-left: 14px;
  border-bottom: 1px solid transparent;
}
#btn-next:hover { border-bottom-color: var(--fg); }

#foot {
  flex: none;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
  gap: 8px 18px;
  padding: 6px clamp(14px, 2.5vw, 30px) clamp(10px, 2vh, 16px);
  font-size: 11px; color: var(--fg-faint);
}
#foot .links { display: flex; align-items: center; gap: 20px; }
#foot button.linky { font-size: 11px; color: var(--fg-faint); letter-spacing: 0.03em; position: relative; }
#foot button.linky:hover { color: var(--fg); }
#foot .wordmark { font-family: ui-monospace, Menlo, monospace; font-weight: 700; color: var(--fg-dim); }
#foot .right { display: flex; align-items: center; gap: 16px; }
#poolcount { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--fg-faint); letter-spacing: 0.06em; }
#btn-compose {
  font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
  background: var(--bone); color: var(--bone-ink);
  padding: 9px 22px; border-radius: 3px;
  transition: background .2s;
  white-space: nowrap;
}
#btn-compose:hover { background: #fff; }
#btn-lang {
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--fg-faint);
  border: 1px solid var(--line); border-radius: 3px; padding: 6px 10px;
}
#btn-lang:hover { color: var(--fg); border-color: #3d3d40; }
#queue-dot {
  display: none;
  position: absolute; top: -5px; right: -13px;
  min-width: 14px; height: 14px; padding: 0 4px;
  background: var(--bone); color: var(--bone-ink);
  font-size: 9px; font-weight: 800; line-height: 14px; text-align: center;
  border-radius: 999px;
}
#queue-dot.on { display: block; }

/* ===== NEW TAB mock (light Chrome-style browser window) ===== */
#nt { position: absolute; inset: 0; display: flex; flex-direction: column; background: #dee1e6; }
#nt-tabs {
  flex: none; display: flex; align-items: flex-end; gap: 4px;
  padding: 8px 10px 0;
  background: #dee1e6;
}
#nt-tabs .tab {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: #3c4043;
  background: #fff;
  border-radius: 8px 8px 0 0;
  padding: 7px 14px;
  min-width: 150px;
}
#nt-tabs .tab .fav { width: 9px; height: 9px; border-radius: 3px; background: #9aa0a6; flex: none; }
#nt-tabs .tab .x { margin-left: auto; color: #80868b; font-size: 12px; }
#nt-tabs .plus { color: #5f6368; font-size: 15px; padding: 4px 8px; }
#nt-bar {
  flex: none; display: flex; align-items: center; gap: 12px;
  padding: 8px 14px;
  background: #fff;
  border-bottom: 1px solid #e2e2e2;
}
#nt-bar .nav { display: flex; gap: 6px; color: #9aa0a6; font-size: 15px; }
#nt-bar .nav span { padding: 2px 6px; }
#nt-bar .omni {
  flex: 1; max-width: 640px;
  font-size: 11.5px; color: #5f6368;
  background: #f1f3f4;
  border-radius: 999px;
  padding: 7px 16px;
}
#nt-bar .dots { color: #5f6368; font-size: 14px; letter-spacing: 2px; }
#nt-page { flex: 1; min-height: 0; position: relative; overflow: hidden; background: linear-gradient(180deg, #ffffff 0%, #f5f7f9 100%); }
/* v8: the world map is no longer the page background — #wall-wrap is a full-screen paint overlay, shown only while painting */
#wall-wrap { position: absolute; inset: 0; overflow: hidden; z-index: 40; background: rgba(12,14,18,0.82); display: none; }
#nt-page.painting #wall-wrap { display: block; }
#wall { position: absolute; image-rendering: pixelated; display: block; }

#nt-col { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 16px; width: min(560px, 88%); margin: 0 auto; padding-top: clamp(20px, 6vh, 56px); }
#nt-clock { text-align: center; color: #202124; user-select: none; }
#clock { font-size: clamp(28px, 3.6vw, 38px); font-weight: 300; letter-spacing: 0.03em; }
#today { margin-top: 2px; font-size: 10.5px; letter-spacing: 0.1em; color: #5f6368; }
#nt-search { width: 100%; }
#nt-search .pill {
  display: flex; align-items: center; gap: 10px;
  background: #fff; border-radius: 999px;
  padding: 12px 20px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.18), 0 10px 26px rgba(0,0,0,0.16);
}
#nt-search svg { width: 16px; height: 16px; color: #9aa0a6; flex: none; }
#nt-search input { flex: 1; min-width: 0; border: none; outline: none; background: transparent; font-size: 13.5px; color: #202124; }
#nt-search input::placeholder { color: #9aa0a6; }
#sl-line { min-height: 24px; width: 100%; display: flex; align-items: flex-start; justify-content: center; }
.sl-line-ad {
  position: relative; display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; justify-content: center;
  color: #3c4043;
  font-size: 12.5px; padding: 4px 12px 28px;
}
.sl-line-lnk { color: #1a73e8; text-decoration: underline; text-underline-offset: 2px; }
.sl-line-by { opacity: 0.6; font-size: 10.5px; }
#nt-tiles { display: grid; grid-template-columns: repeat(4, 54px); grid-auto-rows: auto; gap: 16px clamp(10px, 2.4vw, 22px); justify-content: center; margin-top: 4px; }
.nt-tile { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 54px; color: #5f6368; font-size: 10px; }
.nt-tile .bub { width: 38px; height: 38px; border-radius: 50%; background: #f1f3f4; border: 1px solid #e4e6e9; color: #3c4043; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; transition: transform .15s; }
.nt-tile:hover .bub { transform: translateY(-2px); }

#sl-card { position: absolute; right: clamp(14px, 3vw, 34px); bottom: clamp(48px, 7vh, 72px); width: min(320px, 30vw); aspect-ratio: 320 / 220; z-index: 2; display: flex; align-items: center; justify-content: center; transition: right .25s ease; }
/* 右半面が埋まっているときはカードを内側へ寄せて重なりを避ける */
#nt-page.has-halfR #sl-card { right: calc(34% + 18px); }
#sl-halfL { position: absolute; left: 0; top: 12%; bottom: 12%; width: 34%; z-index: 2; display: flex; align-items: center; justify-content: flex-start; }
#sl-halfR { position: absolute; right: 0; top: 12%; bottom: 12%; width: 34%; z-index: 2; display: flex; align-items: center; justify-content: flex-end; }
#sl-full { position: absolute; inset: 0; z-index: 5; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.18); transition: opacity .55s ease; }
#sl-full.show { display: flex; }
#sl-full.fading { opacity: 0; pointer-events: none; }
/* FTC/IAB: 広告ユニットには近接した明確なラベルを(常時表示) */
.unit-tag {
  position: absolute; left: 8px; top: 8px; z-index: 7;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 8.5px; font-weight: 700; letter-spacing: 0.18em;
  color: rgba(255, 255, 255, 0.85);
  background: rgba(0, 0, 0, 0.42);
  padding: 2.5px 7px; border-radius: 2px;
  pointer-events: none;
}
.sl-line-tag {
  font-family: ui-monospace, Menlo, monospace;
  font-size: 8.5px; font-weight: 700; letter-spacing: 0.16em;
  color: #9aa0a6;
  border: 1px solid #dadce0;
  border-radius: 2px; padding: 1.5px 6px; margin-right: 4px;
  vertical-align: 1px;
}
/* v8: world map rendered as a normal ad (canvas) */
.screen.pixel { position: relative; overflow: hidden; background: #a7afb9; }
.screen.pixel .worldcv { position: absolute; image-rendering: pixelated; }
.sl-full-close {
  position: absolute; top: 14px; right: 14px; z-index: 6;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(0,0,0,0.5); color: #fff; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.sl-full-close:hover { background: rgba(0,0,0,0.7); }

#nt-corner-wrap { position: absolute; left: clamp(14px, 2.5vw, 26px); bottom: clamp(12px, 2.5vh, 20px); z-index: 2; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; max-width: min(360px, 68vw); }
#nt-corner { display: flex; align-items: center; gap: 10px; }
#nt-feed {
  font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: #5f6368;
  background: #fff; border: 1px solid #e4e6e9; border-radius: 4px; padding: 5px 9px;
  opacity: 0; transition: opacity .5s;
  max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#nt-feed.show { opacity: 1; }

/* ===== the ad (canvas-backed slots) ===== */
.screen {
  position: relative;
  border-radius: 4px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(0, 0, 0, 0.5),
    0 24px 60px rgba(0, 0, 0, 0.45);
}
.screen::before {
  content: ''; position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: linear-gradient(165deg, rgba(255, 255, 255, 0.06), transparent 38%);
}

.t-block {
  position: absolute; z-index: 2;
  transform: translate(-50%, -50%);
  width: max-content; max-width: 88%;
  text-align: center; line-height: 1.5;
  white-space: pre-wrap; overflow-wrap: anywhere;
}
.t-block.f-g { font-weight: 900; letter-spacing: 0.02em; }
.t-block.f-m { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-weight: 700; }
.t-block.f-r { font-weight: 700; letter-spacing: 0.14em; }

.stamp { position: absolute; z-index: 3; user-select: none; line-height: 1; }
.doodle { position: absolute; inset: 0; z-index: 4; width: 100%; height: 100%; pointer-events: none; }
.photo { position: absolute; z-index: 1; max-width: none; }

.byline {
  position: absolute; right: 4.5%; bottom: 4%; z-index: 4;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 10.5px; opacity: 0.6; letter-spacing: 0.05em;
}
.sl-full .byline { font-size: 12.5px; }

.p-link { position: absolute; left: 50%; bottom: 7%; transform: translateX(-50%); z-index: 4; display: block; text-decoration: none; width: 62%; text-align: center; }
.sl-card .p-link { width: 76%; }
.sl-full .p-link { width: 30%; }
.p-link .yt {
  position: relative; display: block; border-radius: 6px; overflow: hidden;
  aspect-ratio: 16/9;
  background: #101013;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
}
.p-link .yt img { display: block; width: 100%; height: 100%; object-fit: cover; opacity: 0.94; }
.p-link .yt .play {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: #fff; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
  background: linear-gradient(transparent 55%, rgba(0, 0, 0, 0.5));
}
.p-link .yt-cap { margin-top: 6px; font-size: 11px; opacity: 0.7; }
.p-link .chip {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 700;
  background: rgba(0, 0, 0, 0.28);
  border: 1px solid currentColor; border-radius: 999px;
  padding: 8px 16px;
  opacity: 0.9;
}
.p-link .chip .host { opacity: 0.55; font-weight: 500; }
.p-link:hover .chip { opacity: 1; }
/* B2: X/Twitter mini-card chip (no external fetch — just a bold glyph + handle) */
.lk-xglyph { font-weight: 900; margin-right: 2px; }
.lk-xhandle { opacity: 0.85; }

/* B3: placeable CTA "link block" — separate from the single .p-link chip above */
.lk-block {
  position: absolute; z-index: 4;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  padding: 9px 14px; border-radius: 6px;
  background: rgba(0, 0, 0, 0.34); border: 1px solid rgba(255, 255, 255, 0.32);
  color: #fff; text-decoration: none; text-align: center;
  max-width: 90%; overflow: hidden;
  transition: background .15s;
}
.lk-block:hover { background: rgba(0, 0, 0, 0.52); }
.lk-block .lk-lbl { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.lk-block .lk-host { font-size: 9px; font-weight: 500; opacity: 0.6; letter-spacing: 0.02em; }
.lk-block.lk-yt-playing { padding: 0; background: #000; border-color: transparent; aspect-ratio: 16/9; overflow: hidden; }
.lk-block.lk-yt-playing iframe { width: 100%; height: 100%; border: 0; display: block; }

.enter { animation: pwron .5s cubic-bezier(.2, .9, .3, 1); }
@keyframes pwron {
  0% { opacity: 0; transform: scale(0.97); filter: brightness(1.8) saturate(0.2); }
  100% { opacity: 1; }
}
.rot-enter { animation: rotFade .6s ease; }
@keyframes rotFade {
  0% { opacity: 0; transform: translateY(4px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ===== empty slot placeholders ===== */
.sl-empty {
  display: flex; align-items: center; justify-content: center; text-align: center;
  color: #80868b;
  font-size: 11px; line-height: 1.6;
  border: 1.5px dashed #dadce0;
  border-radius: 6px;
  padding: 10px;
  transition: background .15s, border-color .15s, color .15s;
}
.sl-empty:hover { background: rgba(32,33,36,0.04); border-color: #b9bdc2; color: #5f6368; }
#sl-line .sl-empty { width: 100%; max-width: 420px; padding: 7px 14px; font-size: 11px; border-radius: 999px; }
#sl-card .sl-empty { width: 100%; height: 100%; }
.sl-empty-half {
  width: 44px !important; height: 100% !important;
  border-radius: 0; border-width: 0 1.5px;
  writing-mode: vertical-rl; text-orientation: mixed;
  letter-spacing: 0.1em; padding: 14px 0;
  flex: none;
}
#sl-halfL .sl-empty-half { border-left: none; }
#sl-halfR .sl-empty-half { border-right: none; }

/* ===== hover chips on every slot ad ===== */
.sl-wrap { position: relative; }
.sl-chips {
  position: absolute; left: 50%; bottom: 6px; transform: translateX(-50%);
  z-index: 9;
  display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; max-width: 94%;
  opacity: 0; pointer-events: none; transition: opacity .15s;
}
.sl-wrap:hover .sl-chips, .sl-wrap.chips-on .sl-chips, .sl-wrap:focus-within .sl-chips { opacity: 1; pointer-events: auto; }
.sl-line-ad .sl-chips { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); }
.sl-line-ad:hover .sl-chips, .sl-line-ad.chips-on .sl-chips, .sl-line-ad:focus-within .sl-chips { opacity: 1; pointer-events: auto; }
.sl-chip {
  font-family: ui-monospace, Menlo, monospace; font-size: 10px; letter-spacing: 0.02em;
  background: rgba(0, 0, 0, 0.68); color: #fff;
  padding: 4px 8px; border-radius: 3px; white-space: nowrap;
}
button.sl-chip:hover { background: rgba(0, 0, 0, 0.86); }
.sl-chip.saved { background: var(--bone); color: var(--bone-ink); }
.chip-glow .sl-chips { opacity: 1; pointer-events: auto; }
.chip-glow .sl-chip:first-child { animation: chipGlow 1.2s ease; }
@keyframes chipGlow { 0%, 100% { box-shadow: none; } 30% { box-shadow: 0 0 0 4px rgba(216, 213, 204, 0.4); } }
.sl-chip.flag:hover, .sl-chip.skip:hover { background: rgba(180, 84, 74, 0.86); }
.sl-chip.sl-chip-yes { background: var(--danger); }
.sl-chip.flag.reported { background: var(--danger); }
/* v10: 通報の理由選択はチップの寄せ集めではなく1枚のパネルとして見せる */
.sl-chips.rp-mode {
  background: rgba(10, 10, 12, 0.92); padding: 6px 7px; border-radius: 6px;
  border: 1px solid rgba(255, 255, 255, 0.14); box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
}
.sl-chips.rp-mode .sl-chip { background: rgba(255, 255, 255, 0.09); }
.sl-chips.rp-mode button.sl-chip:hover { background: rgba(180, 84, 74, 0.9); }
.sl-chips.rp-mode .rp-cancel { background: transparent; color: rgba(255, 255, 255, 0.55); }
.sl-chips.rp-mode button.rp-cancel:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }

/* ===== background paint mode ===== */
#wp-bar {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 45;
  display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
  gap: 10px 14px;
  padding: 12px 16px;
  background: rgba(10, 10, 12, 0.85);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
#wp-pal { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
#wp-pal button {
  width: 22px; height: 22px; border-radius: 3px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  transition: transform .12s;
}
#wp-pal button:hover { transform: scale(1.18); }
#wp-pal button.sel { outline: 2px solid #fff; outline-offset: 2px; }
#wp-pal button.erase { background: transparent !important; position: relative; }
#wp-pal button.erase::after { content: '⌀'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #d8d5cc; }
#wp-charges { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: #d8d5cc; letter-spacing: 0.06em; }
#wp-done { font-size: 11.5px; font-weight: 700; background: var(--bone); color: var(--bone-ink); border-radius: 3px; padding: 8px 18px; }
#wp-done:hover { background: #fff; }
#wall.paint-on { cursor: crosshair; }
#wall.paint-on.dragging { cursor: grabbing; }
.wp-mini { font-size: 10.5px; font-weight: 700; color: #d8d5cc; border: 1px solid rgba(255,255,255,0.25); border-radius: 3px; padding: 6px 10px; }
.wp-mini:hover { background: rgba(255,255,255,0.1); }
#wp-coord { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: rgba(216,213,204,0.75); min-width: 46px; }
#wp-ghost { position: absolute; z-index: 5; pointer-events: none; display: none; opacity: 0.55; border-radius: 1px; }
.wp-ripple {
  position: absolute; width: 6px; height: 6px; margin: -3px 0 0 -3px; z-index: 6;
  border-radius: 50%; border: 1.5px solid rgba(26, 29, 34, 0.8); pointer-events: none;
  animation: wpRipple .5s ease-out forwards;
}
@keyframes wpRipple { from { transform: scale(1); opacity: 0.9; } to { transform: scale(9); opacity: 0; } }

/* ===== A5: world-map minimap (paint overlay, bottom-right) ===== */
#wm-mini {
  position: absolute; right: 14px; bottom: 70px; z-index: 7;
  border: 1px solid rgba(216, 213, 204, 0.4); border-radius: 3px;
  overflow: hidden; cursor: crosshair;
  box-shadow: 0 8px 26px rgba(0, 0, 0, 0.5);
  touch-action: none;
}
#wm-mini-cv { display: block; image-rendering: pixelated; }
#wm-mini-rect {
  position: absolute; left: 0; top: 0; z-index: 2;
  border: 1px solid #23272e; background: rgba(35, 39, 46, 0.12);
  pointer-events: none;
}

/* ===== toast ===== */
#toast {
  position: fixed; bottom: 60px; left: 50%; z-index: 200;
  transform: translateX(-50%) translateY(90px);
  background: #1a1a1b; color: var(--fg);
  border: 1px solid #2e2e30;
  font-size: 12.5px; font-weight: 600;
  padding: 11px 20px; border-radius: 3px;
  box-shadow: 0 10px 34px rgba(0, 0, 0, 0.6);
  transition: transform .35s cubic-bezier(.2, .9, .3, 1.1);
  max-width: 88vw;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ===== surface mocks (inside #viewport) ===== */
.sf-fill { position: absolute; inset: 0; overflow: hidden; }

.sf-desk-icons { position: absolute; left: 22px; top: 20px; display: flex; flex-direction: column; gap: 18px; z-index: 3; }
.sf-icon { width: 60px; text-align: center; color: rgba(255, 255, 255, 0.85); font-size: 10px; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7); }
.sf-icon .bx { width: 38px; height: 38px; margin: 0 auto 5px; border-radius: 8px; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2); }
.sf-bar {
  position: absolute; left: 0; right: 0; bottom: 0; height: 44px; z-index: 4;
  background: rgba(14, 14, 16, 0.82);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px;
  font-size: 11px; color: rgba(255, 255, 255, 0.75);
}
.sf-bar .st { width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg, #6a6a70, #b9b6ad); flex: none; }
.sf-bar .app { width: 24px; height: 24px; border-radius: 6px; background: rgba(255, 255, 255, 0.12); flex: none; }
.sf-bar .sp { flex: 1; }
.sf-bar .clk { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; letter-spacing: 0.04em; white-space: nowrap; }
.sf-wall-screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; }
.sf-wall-cap {
  position: absolute; right: 14px; bottom: 54px; z-index: 5;
  display: flex; align-items: center; gap: 10px;
  background: rgba(14, 14, 16, 0.75); backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px;
  padding: 8px 8px 8px 14px;
  font-size: 11px; color: rgba(255, 255, 255, 0.8);
}
.sf-wall-cap button { font-size: 11px; font-weight: 700; background: var(--bone); color: var(--bone-ink); border-radius: 3px; padding: 6px 14px; }

.sf-plain-desk { position: absolute; inset: 0; background: linear-gradient(160deg, #1b1c20, #0f1013 60%); }
.sf-ticker {
  display: flex; align-items: center; gap: 10px;
  height: 32px; width: min(400px, 52%);
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px;
  padding: 0 10px 0 8px;
  overflow: hidden;
}
.sf-ticker .sq { width: 17px; height: 17px; border-radius: 3px; flex: none; }
.sf-ticker .tag { font-family: ui-monospace, Menlo, monospace; font-size: 8.5px; letter-spacing: 0.18em; color: rgba(255, 255, 255, 0.45); flex: none; }
.sf-ticker .win { flex: 1; min-width: 0; overflow: hidden; position: relative; height: 100%; display: flex; align-items: center;
  mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); }
.sf-ticker .tape { display: inline-block; white-space: nowrap; font-size: 12px; color: rgba(255, 255, 255, 0.88); animation: tick 16s linear infinite; padding-left: 100%; }
@keyframes tick { to { transform: translateX(-100%); } }
.sf-ticker .bst { display: inline-flex; align-items: center; gap: 5px; font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: rgba(255, 255, 255, 0.75); flex: none; border: 1px solid rgba(255, 255, 255, 0.22); border-radius: 3px; padding: 3px 8px; cursor: pointer; }
.sf-ticker .bst:hover { background: rgba(255, 255, 255, 0.1); }

.sf-term-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(160deg, #17181c, #0c0d10); }
.sf-term {
  width: min(620px, 92%);
  background: #0c0e10;
  border: 1px solid #26282c; border-radius: 8px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
  overflow: hidden;
}
.sf-term .bar { display: flex; align-items: center; gap: 7px; padding: 10px 14px; background: #16181c; border-bottom: 1px solid #26282c; }
.sf-term .bar i { width: 11px; height: 11px; border-radius: 50%; background: #3a3d44; }
.sf-term .bar span { margin-left: 8px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #6a6e76; }
.sf-term pre {
  padding: 18px 22px 22px;
  font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  font-size: 12.5px; line-height: 1.75;
  color: #b8bec8;
  white-space: pre-wrap; overflow-wrap: anywhere;
}
.sf-term .g { color: #8fae88; }
.sf-term .c { color: #5a5f68; }

.sf-stream { position: absolute; inset: 0; background: linear-gradient(185deg, #1c1d21, #101013 60%); overflow: hidden; }
.sf-stream::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 55% 45% at 44% 38%, rgba(255, 255, 255, 0.05), transparent 70%); }
.sf-live {
  position: absolute; left: 16px; top: 14px; z-index: 5;
  display: flex; align-items: center; gap: 10px;
  font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: rgba(255, 255, 255, 0.8);
}
.sf-live .rec { background: #a13a30; color: #fff; font-weight: 700; border-radius: 3px; padding: 3px 9px; letter-spacing: 0.12em; }
.sf-cam {
  position: absolute; left: 16px; bottom: 16px; z-index: 5;
  width: 180px; aspect-ratio: 16/10;
  border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.14);
  background: linear-gradient(180deg, #1b1e24, #12141a);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255, 255, 255, 0.22); font-size: 10px;
  font-family: ui-monospace, Menlo, monospace; letter-spacing: 0.3em;
}
.sf-ovl {
  position: absolute; right: 16px; bottom: 16px; z-index: 6;
  display: flex; flex-direction: column; align-items: flex-end; gap: 7px;
}
.sf-ovl .ovl-cap { font-family: ui-monospace, Menlo, monospace; font-size: 9.5px; letter-spacing: 0.14em; color: rgba(255, 255, 255, 0.5); }
.sf-ovl .holder { position: relative; }

/* ===== C: taskbar surface (Windows-11-ish desktop + bottom bar) ===== */
.tb-desktop { position: absolute; inset: 0; background: linear-gradient(160deg, #eceef1 0%, #d6d8dc 100%); }
.tb-bar {
  position: absolute; left: 0; right: 0; bottom: 0; height: 48px; z-index: 4;
  display: flex; align-items: center; gap: 14px;
  padding: 0 16px;
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid rgba(0, 0, 0, 0.09);
  color: #1c1c1e;
}
.tb-center { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
.tb-pins { display: flex; align-items: center; gap: 6px; }
.tb-start, .tb-pin {
  width: 38px; height: 38px; border-radius: 8px; flex: none;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.tb-start:hover, .tb-pin:hover { background: rgba(0, 0, 0, 0.07); }
.tb-start { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 3px; padding: 10px; align-items: stretch; justify-content: stretch; }
.tb-start i { background: #3c3c41; border-radius: 2px; }
.tb-ico { display: inline-flex; align-items: center; justify-content: center; width: 17px; height: 17px; color: #3c3c41; }
.tb-ico-dot { width: 13px; height: 13px; border-radius: 50%; background: currentColor; }
.tb-ico-tri { width: 15px; height: 13px; background: currentColor; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
.tb-ico-diamond { width: 12px; height: 12px; background: currentColor; border-radius: 2px; transform: rotate(45deg); }
.tb-ico-bars { display: flex; flex-direction: column; justify-content: center; gap: 3px; width: 16px; }
.tb-ico-bars i { display: block; height: 2.5px; border-radius: 1px; background: currentColor; }
.tb-ico-bars i:nth-child(1) { width: 100%; }
.tb-ico-bars i:nth-child(2) { width: 70%; }
.tb-ico-bars i:nth-child(3) { width: 85%; }
.tb-ad {
  position: relative; flex: none; width: min(360px, 34vw); min-width: 140px;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 30px 6px 10px; border-radius: 6px;
  cursor: pointer; transition: background .15s;
  overflow: hidden;
}
.tb-ad:hover { background: rgba(0, 0, 0, 0.07); }
.tb-ad-tag {
  flex: none; font-family: ui-monospace, Menlo, monospace; font-size: 8px; font-weight: 700; letter-spacing: 0.14em;
  color: #6b6b70; border: 1px solid rgba(0, 0, 0, 0.2); border-radius: 2px; padding: 2px 5px;
}
.tb-ad-body { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
.tb-ad-host { flex: none; font-size: 10px; color: #6b6b70; }
.tb-ad-x {
  display: none; position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  width: 19px; height: 19px; border-radius: 50%;
  align-items: center; justify-content: center;
  background: rgba(0, 0, 0, 0.14); color: #1c1c1e; font-size: 10.5px;
}
.tb-ad:hover .tb-ad-x { display: flex; }
.tb-clock {
  flex: none; display: flex; flex-direction: column; align-items: flex-end; line-height: 1.3;
  padding-left: 12px; border-left: 1px solid rgba(0, 0, 0, 0.13);
  font-family: ui-monospace, Menlo, monospace;
}
.tb-clk-time { font-size: 13px; font-weight: 700; }
.tb-clk-date { font-size: 9.5px; color: #6b6b70; }
@media (max-width: 640px) {
  .tb-bar { gap: 8px; padding: 0 10px; }
  .tb-pins { display: none; } /* keep the start button, drop the pinned row so the bar fits */
  .tb-ad { width: 38vw; min-width: 80px; padding-right: 24px; }
  .tb-clk-date { display: none; }
  .tb-clock { padding-left: 8px; }
}

/* ===== overlays ===== */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(5, 5, 8, 0.82);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: none;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.overlay.show { display: block; }

/* ===== about ===== */
#about .card {
  width: min(580px, calc(100vw - 32px));
  margin: clamp(20px, 6vh, 70px) auto 40px;
  background: #171718;
  border: 1px solid #29292b; border-radius: 10px;
  padding: clamp(28px, 5vw, 44px);
  box-shadow: 0 30px 90px rgba(0, 0, 0, 0.7);
}
#about .a-mark { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--fg); }
#about .a-mark span { margin-left: 12px; color: var(--fg-faint); letter-spacing: 0.12em; }
#about h2 { font-size: clamp(21px, 4vw, 28px); font-weight: 800; line-height: 1.45; margin-top: 16px; letter-spacing: -0.01em; }
#about .lead { font-size: 13.5px; line-height: 1.95; margin-top: 14px; color: var(--fg-dim); }
#about h3 { margin-top: 26px; font-family: ui-monospace, Menlo, monospace; font-size: 10px; letter-spacing: 0.24em; color: var(--fg-faint); font-weight: 700; }
#about ul { list-style: none; margin-top: 12px; display: flex; flex-direction: column; gap: 11px; }
#about li { font-size: 13px; line-height: 1.8; color: var(--fg-dim); padding-left: 18px; position: relative; }
#about li::before { content: '—'; position: absolute; left: 0; color: var(--fg-faint); }
#about li b { color: var(--fg); }
#about .a-note { margin-top: 24px; font-size: 11.5px; line-height: 1.85; color: var(--fg-faint); border-top: 1px dashed #2a2a2c; padding-top: 16px; }
#about .a-cta { margin-top: 26px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
#about .a-go {
  font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
  background: var(--bone); color: var(--bone-ink);
  padding: 13px 34px; border-radius: 3px;
  transition: background .2s;
}
#about .a-go:hover { background: #fff; }
#about .a-sub { font-size: 11px; color: var(--fg-faint); }
.gl-inline {
  display: inline-block; margin-left: 4px;
  color: var(--fg); font-weight: 700; border-bottom: 1px solid var(--fg-faint);
}
.gl-inline:hover { border-color: var(--fg); }

/* ===== guidelines / terms / privacy ===== */
#gl-modal .card {
  width: min(580px, calc(100vw - 32px));
  margin: clamp(20px, 6vh, 70px) auto 40px;
  background: #171718;
  border: 1px solid #29292b; border-radius: 10px;
  padding: clamp(28px, 5vw, 44px);
  box-shadow: 0 30px 90px rgba(0, 0, 0, 0.7);
  position: relative;
}
.gl-close { position: absolute; right: 14px; top: 14px; font-size: 18px; color: var(--fg-faint); padding: 4px 10px; }
.gl-close:hover { color: var(--fg); }
.gl-tabs { display: inline-flex; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; margin-bottom: 22px; }
.gl-tab { font-size: 11px; font-weight: 600; color: var(--fg-dim); padding: 8px 14px; }
.gl-tab:hover { color: var(--fg); }
.gl-tab.sel { background: rgba(255, 255, 255, 0.1); color: var(--fg); }
.gl-body h2 { font-size: clamp(18px, 3.4vw, 22px); font-weight: 800; line-height: 1.4; letter-spacing: -0.01em; }
.gl-body p { font-size: 13px; line-height: 1.9; color: var(--fg-dim); margin-top: 14px; }
/* ===== D: data export/import (privacy tab) ===== */
.gl-data-actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
.gl-data-btn {
  font-size: 11px; font-weight: 700; letter-spacing: 0.04em; color: var(--fg);
  border: 1px solid var(--line); border-radius: 3px; padding: 8px 16px;
  transition: background .15s, border-color .15s;
}
.gl-data-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: #3d3d40; }

/* ===== gallery + hall of fame ===== */
.gal-frame { width: min(1180px, calc(100vw - 32px)); margin: clamp(20px, 4vh, 50px) auto 60px; }
.gal-head { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; padding: 0 4px 18px; border-bottom: 1px solid #29292b; margin-bottom: 24px; }
.gal-head-txt { display: flex; flex-direction: column; gap: 4px; margin-right: auto; }
.gal-ttl { font-size: clamp(16px, 2.4vw, 20px); font-weight: 800; letter-spacing: -0.01em; }
.gal-count { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--fg-faint); letter-spacing: 0.04em; }
.gal-sort, .gal-tabs { display: inline-flex; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
.gal-sort button, .gal-tabs button { font-size: 11px; font-weight: 600; color: var(--fg-dim); padding: 7px 12px; }
.gal-sort button:hover, .gal-tabs button:hover { color: var(--fg); }
.gal-sort button.sel, .gal-tabs button.sel { background: rgba(255, 255, 255, 0.1); color: var(--fg); }
.gal-close { font-size: 18px; color: var(--fg-faint); padding: 4px 10px; }
.gal-close:hover { color: var(--fg); }

.gal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; padding: 0 4px; }
.gal-card { position: relative; display: flex; flex-direction: column; gap: 8px; }
.gal-thumb-media { position: relative; overflow: hidden; border-radius: 6px; border: 1px solid var(--line); background: #0d0d0e; }
.gal-thumb-media .screen { border-radius: 6px; }
.gal-thumb-line {
  min-height: 100px; display: flex; align-items: center; justify-content: center; text-align: center;
  padding: 14px; border-radius: 6px; border: 1px solid var(--line); background: #1a1a1c;
}
.gal-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px; font-size: 10.5px; color: var(--fg-faint); padding: 0 2px; }
.gal-tag { font-family: ui-monospace, Menlo, monospace; font-size: 9px; letter-spacing: 0.12em; color: var(--fg-dim); border: 1px solid var(--line); border-radius: 2px; padding: 2px 6px; }
.gal-author { color: var(--fg-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
.gal-savesn { margin-left: auto; font-family: ui-monospace, Menlo, monospace; color: var(--fg-dim); }
.gal-empty { grid-column: 1 / -1; text-align: center; padding: 44px 20px; color: var(--fg-faint); border: 1px dashed var(--line); border-radius: 8px; }

.gal-chips { position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%); z-index: 5; display: flex; gap: 5px; opacity: 0; pointer-events: none; transition: opacity .15s; }
.gal-card:hover .gal-chips, .gal-card:focus-within .gal-chips { opacity: 1; pointer-events: auto; }

.gal-mine-badge {
  position: absolute; right: 7px; top: 7px; z-index: 6;
  font-family: ui-monospace, Menlo, monospace; font-size: 8.5px; font-weight: 700; letter-spacing: 0.1em;
  padding: 3px 7px; border-radius: 2px;
  background: var(--bone); color: var(--bone-ink);
}
.hall-card { position: relative; }

#gal-link-nt {
  font-family: ui-monospace, Menlo, monospace; font-size: 10px; letter-spacing: 0.04em;
  color: #5f6368;
  align-self: flex-start; padding: 1px 0;
}
#gal-link-nt:hover { color: #202124; }

/* ===== editor (composer) ===== */
#composer .frame {
  min-height: 100dvh;
  display: flex; flex-direction: column;
  background: #141415;
}
#ed-top {
  flex: none;
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  padding: 12px clamp(14px, 2.5vw, 26px);
  border-bottom: 1px solid var(--line);
  background: #171718;
}
#ed-top .ttl { font-size: 13.5px; font-weight: 800; letter-spacing: 0.03em; margin-right: 6px; }
#ed-close { font-size: 18px; color: var(--fg-faint); padding: 4px 10px; }
#ed-close:hover { color: var(--fg); }
.ed-group { display: flex; align-items: center; gap: 8px; }
.ed-group .glbl { font-family: ui-monospace, Menlo, monospace; font-size: 9px; letter-spacing: 0.2em; color: var(--fg-faint); }
.seg { display: inline-flex; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
.seg button { font-size: 11px; font-weight: 600; color: var(--fg-dim); padding: 7px 12px; }
.seg button:hover { color: var(--fg); }
.seg button.sel { background: rgba(255, 255, 255, 0.1); color: var(--fg); }
.seg button:disabled { opacity: 0.35; pointer-events: none; }
input[type="color"] {
  width: 30px; height: 30px; padding: 0; border: 1px solid var(--line); border-radius: 5px;
  background: none; cursor: pointer;
}
input[type="color"]::-webkit-color-swatch-wrapper { padding: 3px; }
input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }
#bg-ang { width: 76px; accent-color: var(--bone); }
.preset-row { display: flex; gap: 6px; }
.preset { width: 22px; height: 22px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.14); transition: transform .12s; }
.preset:hover { transform: scale(1.16); }
#ed-post {
  margin-left: auto;
  font-size: 12.5px; font-weight: 700; letter-spacing: 0.06em;
  background: var(--bone); color: var(--bone-ink);
  padding: 10px 26px; border-radius: 3px;
  transition: background .2s;
}
#ed-post:hover { background: #fff; }

/* placement picker */
#ed-placement { position: relative; width: 210px; height: 128px; border-radius: 6px; overflow: hidden; background: #e9ebee; border: 1px solid #3a3a3d; cursor: pointer; }
.pp-zone { position: absolute; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; letter-spacing: 0.02em; color: #63656a; background: transparent; transition: background .15s, color .15s; }
.pp-zone:hover { background: rgba(20,20,22,0.14); color: #33343a; }
.pp-zone.sel { background: var(--bone); color: var(--bone-ink); }
.pp-full { inset: 0; z-index: 1; }
.pp-halfL { left: 0; top: 0; bottom: 0; width: 30%; z-index: 2; }
.pp-halfR { right: 0; top: 0; bottom: 0; width: 30%; z-index: 2; }

#ed-line-form { display: none; flex-direction: column; align-items: center; gap: 12px; width: min(420px, 92%); }

}

/* mini "always on" preview */

#mp-page {

  border-radius: 6px; overflow: hidden;

}
#mp-page .mp-search { position: absolute; left: 50%; top: 20px; transform: translateX(-50%); width: 150px; height: 15px; background: #fff; border: 1px solid #e4e6e9; border-radius: 999px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
#mp-page .mp-tiles { position: absolute; left: 50%; top: 46px; transform: translateX(-50%); display: flex; gap: 7px; }

#mp-card { right: 8px; bottom: 8px; width: 92px; height: 63px; }

#mp-halfR { right: 0; top: 14%; bottom: 14%; width: 26%; }

/* contextual options bar */
#ed-ctx {
  flex: none;

}

/* selection handles + snap guides */
.ed-handles { position: absolute; z-index: 15; pointer-events: none; display: none; }
.ed-handles.show { display: block; }

.ed-h-nw { left: 0; top: 0; transform: translate(-50%, -50%); cursor: nwse-resize; }
.ed-h-se { right: 0; bottom: 0; transform: translate(50%, 50%); cursor: nwse-resize; }
.ed-h-ne { right: 0; top: 0; transform: translate(50%, -50%); cursor: nesw-resize; }
.ed-h-sw { left: 0; bottom: 0; transform: translate(-50%, 50%); cursor: nesw-resize; }
.ed-rot-line { position: absolute; left: 50%; top: -22px; width: 0; height: 22px; border-left: 1.5px solid rgba(255,255,255,0.85); pointer-events: none; }
.ed-h-rot { left: 50%; top: -26px; width: 11px; height: 11px; border-radius: 50%; transform: translate(-50%, -50%); cursor: grab; }
.ed-snap-line { position: absolute; z-index: 12; pointer-events: none; display: none; }
.ed-snap-line.v { top: 0; bottom: 0; left: 50%; width: 0; border-left: 1.5px dashed var(--bone); }
.ed-snap-line.h { left: 0; right: 0; top: 50%; height: 0; border-top: 1.5px dashed var(--bone); }

/* template picker overlay */
#ed-tmpl { position: absolute; inset: 0; z-index: 20; display: none; align-items: center; justify-content: center; background: rgba(10, 10, 11, 0.72); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); border-radius: 6px; }

.ed-tmpl-panel { position: relative; width: min(420px, 92%); background: #1a1a1c; border: 1px solid var(--line); border-radius: 8px; padding: 22px 22px 18px; box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55); }
.ed-tmpl-close { position: absolute; top: 8px; right: 8px; font-size: 14px; color: var(--fg-faint); padding: 6px; }
.ed-tmpl-close:hover { color: var(--fg); }
.ed-tmpl-ttl { font-family: ui-monospace, Menlo, monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--fg-faint); margin-bottom: 14px; text-align: center; }
.ed-tmpl-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.ed-tmpl-card { display: flex; flex-direction: column; align-items: stretch; gap: 8px; padding: 12px; border: 1px solid var(--line); border-radius: 6px; font-size: 12px; font-weight: 700; color: var(--fg-dim); background: rgba(255, 255, 255, 0.02); text-align: center; }
.ed-tmpl-card:hover { border-color: var(--bone); color: var(--fg); background: rgba(255, 255, 255, 0.05); }
.ed-tmpl-sw { display: block; width: 100%; height: 30px; border-radius: 4px; }
.ed-tmpl-blank { margin-top: 12px; width: 100%; text-align: center; font-size: 11.5px; color: var(--fg-faint); padding: 10px; border-radius: 5px; border: 1px dashed var(--line); }
.ed-tmpl-blank:hover { color: var(--fg); border-color: #45454e; }
.sticker-row { display: flex; gap: 5px; overflow-x: auto; max-width: min(560px, 70vw); padding: 2px; }
.sticker-row button {
  flex: none; width: 34px; height: 34px; border-radius: 6px; font-size: 17px;
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
}
.sticker-row button:hover { border-color: var(--bone); }
.sticker-row button.sel { border-color: var(--bone); background: rgba(255, 255, 255, 0.06); }

/* details row (link / name) */
#ed-details {
  flex: none;
  display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
  gap: 8px 14px;
  padding: 9px clamp(14px, 2.5vw, 26px) 12px;
  background: #171718;
  font-size: 11px; color: var(--fg-faint);
}
.ed-input {
  background: #101011; color: var(--fg);
  border: 1px solid var(--line); border-radius: 4px;
  padding: 8px 11px; font-size: 12px;
  width: 250px; max-width: 68vw;
}
.ed-input.sm { width: 140px; }
.ed-input:focus { outline: none; border-color: var(--bone); }
#ed-review-note { flex-basis: 100%; text-align: center; margin-top: 4px; font-size: 10.5px; color: var(--fg-faint); line-height: 1.6; }
#rl-left { flex-basis: 100%; text-align: center; margin-top: 2px; font-size: 10.5px; color: var(--fg-faint); letter-spacing: 0.02em; }
#link-status, #lk-status { font-size: 10.5px; }
#link-status.warn, #lk-status.warn { color: var(--danger); }
#link-status.ok, #lk-status.ok { color: var(--fg-dim); }
.shakeit { animation: shakeit .4s ease; }
@keyframes shakeit { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

/* ===== admin ===== */
#console-scrim { position: fixed; inset: 0; z-index: 140; background: rgba(5, 5, 8, 0.6); display: none; }
#console-scrim.show { display: block; }
#console {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 150;
  width: min(430px, 100vw);
  background: #151516; border-left: 1px solid var(--line);
  transform: translateX(105%);
  transition: transform .35s cubic-bezier(.2, .9, .3, 1);
  display: flex; flex-direction: column;
}
#console.show { transform: translateX(0); }
#console header {
  flex: none; display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 14px;
  border-bottom: 1px solid var(--line);
}
#console header h3 { font-size: 14px; font-weight: 800; letter-spacing: 0.03em; }
#console header .sub { display: block; margin-top: 3px; font-size: 10px; color: var(--fg-faint); font-weight: 500; }
#console-close { font-size: 18px; color: var(--fg-faint); padding: 4px 10px; }
#console-close:hover { color: var(--fg); }
#console .body { flex: 1; overflow-y: auto; padding: 18px 24px 40px; }
.q-sec { margin-top: 18px; }
.q-sec:first-child { margin-top: 0; }
.q-label { font-family: ui-monospace, Menlo, monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.22em; color: var(--fg-faint); }
.q-empty { margin-top: 10px; font-size: 12px; color: var(--fg-faint); border: 1px dashed var(--line); border-radius: 6px; padding: 14px; text-align: center; }
.q-item {
  margin-top: 12px;
  border: 1px solid var(--line); border-radius: 8px;
  padding: 13px;
  display: flex; gap: 13px; align-items: center;
}
.q-mini { flex: none; position: relative; overflow: hidden; border-radius: 4px; background: #0d0d0e; display: flex; align-items: center; justify-content: center; }
.q-mini .screen { position: absolute; left: 0; top: 0; transform-origin: 0 0; border-radius: 3px; }
.q-mini .q-mini-txt { font-size: 9.5px; color: var(--fg-dim); text-align: center; padding: 4px; line-height: 1.4; }
.q-info { flex: 1; min-width: 0; }
.q-info .t { font-size: 12.5px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.q-info .m { margin-top: 3px; font-size: 10.5px; color: var(--fg-faint); }
.q-info .m.mine { color: var(--bone); font-weight: 700; }
.q-acts { display: flex; flex-direction: column; gap: 7px; }
.q-btn { font-size: 11.5px; font-weight: 700; border-radius: 3px; padding: 8px 13px; white-space: nowrap; }
.q-btn.ok { background: var(--bone); color: var(--bone-ink); }
.q-btn.no { border: 1px solid var(--line); color: var(--fg-dim); }
.q-btn.no:hover { color: var(--fg); border-color: #45454e; }
.q-tools { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
.q-tool { font-size: 11.5px; font-weight: 700; border: 1px solid var(--line); border-radius: 3px; padding: 8px 13px; color: var(--fg-dim); }
.q-tool:hover { color: var(--fg); border-color: #45454e; }
#q-clock { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--fg-faint); margin-top: 10px; }
.q-note { margin-top: 22px; font-size: 11px; line-height: 1.85; color: var(--fg-faint); border-top: 1px dashed #2a2a2c; padding-top: 14px; }
.q-info .m.rp-reason { color: var(--danger); }

/* ===== admin console, small screens: stack each queue item into one column and give
   approve/return buttons thumb-sized tap targets (D: mobile review) ===== */
@media (max-width: 640px) {
  #console { width: 100vw; }
  .q-item { flex-wrap: wrap; }
  .q-mini { order: 1; }
  .q-info { order: 2; flex-basis: 100%; }
  .q-acts { order: 3; flex-basis: 100%; flex-direction: row; gap: 8px; }
  .q-acts .q-btn {
    flex: 1; min-height: 40px;
    display: flex; align-items: center; justify-content: center;
  }
}

/* ===== responsive ===== */
@media (max-width: 760px) {
  #ed-main { flex-direction: column; }

  .gal-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .gal-head { gap: 10px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

function migrateGridStringToPx(grid, oldCols, meta, k) {
  const px = {}, newMeta = {};

  for (const k in oldMeta) {
    const i = +k, x = i % oldCols, y = Math.floor(i / oldCols);

      out.push(line);

/* ================= surfaces ================= */
let surface = 'newtab';

let fullClosed = false;

let paintMode = false;

/* ================= v7: weighted exposure engine =================
   weight = debut × quality × fatigue × mute
   Ads never expire; what changes over time is how often they're picked. */
function todayStr() { return new Date(T()).toISOString().slice(0, 10); }
function seenOf(id) {
  const s = store.seen && store.seen[id];
  if (!s) return { d: todayStr(), today: 0, total: 0 };
  if (s.d !== todayStr()) return { d: todayStr(), today: 0, total: s.total || 0 };
  return s;
}
function recordSeen(id) {
  store.seen = store.seen || {};
  const cur = seenOf(id);
  store.seen[id] = { d: todayStr(), today: cur.today + 1, total: cur.total + 1 };
  save();
}

/* ================= v10: posting rate limit — 5 posts / browser / day ================= */
const RATE_MAX = 5;
function rateState() {
  const today = todayStr();
  if (!store.rate || store.rate.d !== today) store.rate = { d: today, n: 0 };
  return store.rate;
}
function rateLeft() { return Math.max(0, RATE_MAX - rateState().n); }
function rateConsume() { const r = rateState(); r.n = (r.n || 0) + 1; save(); }
function updateRateDisplay() {
  const el = $('rl-left');
  if (!el) return;
  const left = rateLeft();
  el.textContent = left > 0 ? t('rate_left', left) : t('rate_limit');
}
function weightOf(p) {
  if (store.muted && store.muted[p.id]) return 0;
  const ageH = (T() - p.postedAt) / H;
  const debut = p.pixel ? 1.0 : (ageH < DEBUT_H1 ? 3.0 : ageH < DEBUT_H2 ? 1.0 : 0.5);
  const quality = 1 + Math.min(p.saves || 0, 20) * 0.15;
  const seen = seenOf(p.id);
  let fatigue = 1;
  if (seen.today >= 3) fatigue = 0.05;
  if (seen.total >= 10) fatigue *= 0.5;
  return debut * quality * fatigue;
}
function weightedPick(pool) {
  if (!pool.length) return null;
  const weights = pool.map(weightOf);
  const total = weights.reduce((a, b) => a + b, 0);
  if (total <= 0) return null;
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) { r -= weights[i]; if (r <= 0) return pool[i]; }
  return pool[pool.length - 1];
}
function poolFor(slotId) {
  const pool = liveAds().filter(p => p.slot === slotId);
  if (slotId === 'full') pool.push(worldAd('full')); // world also does full-screen takeovers
  return pool;
}
function pickForSlot(slotId) { return weightedPick(poolFor(slotId)); }

function drawAllSlots() {
  fullClosed = false;
  for (const s of SLOT_ORDER) slotCurrent[s] = pickForSlot(s);
  // ここでは広告が主役(見に来る人がいる)ので密度は絞らない。
  // ただし全面ジャックが毎回だとページ自体を見られないので、開幕は1/3で登場。
  // 登場後はローテーションに乗って通り過ぎていく(下のrotateSlot参照)。
  if (slotCurrent.full && Math.random() > 0.33) slotCurrent.full = null;
}

/* ================= B2: ambient activity simulation (demo "aliveness") ================= */
/* v11: filled-cell extraction reads world.px's (sparse) keys instead of scanning all 1.28M cells */
function pickClusterCell() {
  const filled = Object.keys(world.px);
  const baseI = filled.length ? +filled[Math.floor(Math.random() * filled.length)] : Math.floor(Math.random() * WORLD_COLS * WORLD_ROWS);
  const bx = baseI % WORLD_COLS, by = Math.floor(baseI / WORLD_COLS);
  const nx = Math.max(0, Math.min(WORLD_COLS - 1, bx + Math.floor(Math.random() * 7) - 3));
  const ny = Math.max(0, Math.min(WORLD_ROWS - 1, by + Math.floor(Math.random() * 7) - 3));
  return { x: nx, y: ny };
}
/* D2: one ambient event now lays down a small run of 1-3 adjacent cells (a lone dot reads as too
   sparse at this scale) instead of a single pixel; each cell is still an incremental master
   update, never a full rebuild. */
function simulatePaintEvent() {
  const { x, y } = pickClusterCell();
  const ci = Math.floor(Math.random() * PX_PAL.length);
  const ch = ci.toString(16);
  const handle = t('feed_someone', 1000 + Math.floor(Math.random() * 9000));
  const n = 1 + Math.floor(Math.random() * 3);
  const dirs = [[1, 0], [0, 1], [1, 1], [-1, 0], [0, -1]];
  const [dx, dy] = dirs[Math.floor(Math.random() * dirs.length)];
  let placedAny = false, lastX = x, lastY = y;
  for (let i = 0; i < n; i++) {
    const cx = Math.max(0, Math.min(WORLD_COLS - 1, x + dx * i));
    const cy = Math.max(0, Math.min(WORLD_ROWS - 1, y + dy * i));
    const idx = cy * WORLD_COLS + cx;
    if (world.px[idx] === ch) continue;
    world.px[idx] = ch;
    world.meta[idx] = handle;
    world.placed = (world.placed || 0) + 1;
    updateMasterCell(cx, cy, ch);
    lastX = cx; lastY = cy; placedAny = true;
  }
  if (placedAny) {
    world.lastIdx = lastY * WORLD_COLS + lastX; // A8: remember the most recently painted cell for the card-slot crop
    saveWorld();
    if (paintMode && $('wall')) { syncWallFromMaster(); refreshMinimapCanvas(); spawnRipple(lastX, lastY); }
    else refreshWorldSlots();
    pushFeedEvent(t('feed_paint_body', handle, t('region_' + regionOf(lastX, lastY))));
  }
  scheduleAmbientPaint();
}

/* ---- global undo/redo (A1) ----

let undoStack = [], redoStack = [];
const UNDO_MAX = 50;
function snapCP() {

}
function commitInstant(preSnap) {

}
function updateUndoBtns() {
  const u = $('ed-undo'), r = $('ed-redo');
  if (u) u.disabled = undoStack.length === 0;
  if (r) r.disabled = redoStack.length === 0;
}
function applySnap(json) {
  const o = JSON.parse(json);
  cp.slot = o.slot; cp.bg = o.bg; cp.texts = o.texts; cp.stamps = o.stamps;
  cp.strokes = o.strokes; cp.images = o.images || []; cp.link = o.link; cp.links = o.links || []; cp.lineText = o.lineText;
  clearSel();

  $('bg-c2').value = cp.bg.c2 || '#000000';

}
function doUndo() {

  redoStack.push(snapCP());
  const prev = undoStack.pop();
  applySnap(prev);
}
function doRedo() {

  undoStack.push(snapCP());

/* ---- selection handles: 4 corner scale handles + rotate handle (A2) ---- */
function updateHandles() {
  const hbox = $('ed-handles');
  if (!hbox) return;
  if (!sel || cp.slot === 'line') { hbox.classList.remove('show'); return; }
  const d = selData();
  const box = $('c-scale');
  const el = box && box.querySelector('[data-kind="' + sel.kind + '"][data-idx="' + sel.idx + '"]');
  if (!d || !el) { hbox.classList.remove('show'); return; }
  const s = parseFloat(box.dataset.s) || 1;
  const dims = SLOTS[cp.slot];
  const w = el.offsetWidth * s, h = el.offsetHeight * s;
  const cx = (d.x / 100) * dims.W * s, cy = (d.y / 100) * dims.H * s;
  hbox.style.left = (cx - w / 2) + 'px';
  hbox.style.top = (cy - h / 2) + 'px';
  hbox.style.width = w + 'px';
  hbox.style.height = h + 'px';
  hbox.style.transform = 'rotate(' + (d.r || 0) + 'deg)';
  hbox.classList.add('show');
}
function bindHandles(container) {
  container.querySelectorAll('.ed-handle').forEach(h => {
    h.addEventListener('pointerdown', e => {
      if (!sel) return;
      e.stopPropagation(); e.preventDefault();
      startHandleDrag(e, h.dataset.h === 'rot' ? 'rotate' : 'resize');
    });

}
function startHandleDrag(e, type) {
  const d = selData();
  if (!d) return;
  const box = $('c-scale');
  const s = parseFloat(box.dataset.s) || 1;
  const dims = SLOTS[cp.slot];
  const boxRect = box.getBoundingClientRect();
  const cx = boxRect.left + (d.x / 100) * dims.W * s;
  const cy = boxRect.top + (d.y / 100) * dims.H * s;
  const startDist = Math.max(4, Math.hypot(e.clientX - cx, e.clientY - cy));
  const startAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
  const startScale = sel.kind === 'stamp' ? (d.s || 1) : (sel.kind === 'image' || sel.kind === 'link') ? (d.w || (sel.kind === 'link' ? 26 : 40)) : (d.scale || 1);
  const startR = d.r || 0;
  const pre = snapCP();
  const handle = e.currentTarget;
  try { handle.setPointerCapture(e.pointerId); } catch (err) {}
  function move(ev) {
    if (type === 'resize') {
      const dist = Math.max(4, Math.hypot(ev.clientX - cx, ev.clientY - cy));
      const factor = dist / startDist;
      let ns = startScale * factor;
      if (sel.kind === 'stamp') { d.s = Math.max(0.3, Math.min(7, ns)); }
      else if (sel.kind === 'image') { d.w = Math.max(4, Math.min(95, ns)); }
      else if (sel.kind === 'link') { d.w = Math.max(10, Math.min(70, ns)); }
      else { d.scale = Math.max(0.4, Math.min(5, ns)); }
    } else {
      const ang = Math.atan2(ev.clientY - cy, ev.clientX - cx) * 180 / Math.PI;
      let r = startR + (ang - startAngle);
      if (ev.shiftKey) r = Math.round(r / 15) * 15;
      d.r = Math.round(r * 10) / 10;
    }
    applyElStyleFromData(sel.kind, sel.idx);
    renderMiniPreview();
    updateHandles();
  }
  function up() {
    handle.removeEventListener('pointermove', move);
    handle.removeEventListener('pointerup', up);
    handle.removeEventListener('pointercancel', up);
    commitInstant(pre);
  }
  handle.addEventListener('pointermove', move);
  handle.addEventListener('pointerup', up);
  handle.addEventListener('pointercancel', up);
}

function pickImage() {

function processImageFile(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const maxSide = 1000;
      let w = img.naturalWidth || 1, h = img.naturalHeight || 1;
      const scale = Math.min(1, maxSide / Math.max(w, h));
      w = Math.max(1, Math.round(w * scale)); h = Math.max(1, Math.round(h * scale));
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      const ctx = cv.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const wantsPng = /png|gif/.test(file.type); // only keep a lossless format when transparency is plausible
      let dataUrl = wantsPng ? cv.toDataURL('image/png') : cv.toDataURL('image/jpeg', 0.85);
      if (dataUrl.length > 400 * 1024 * 1.37) dataUrl = cv.toDataURL('image/jpeg', 0.7); // v7: recompress if >400KB
      resolve(dataUrl);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('load-failed')); };
    img.src = url;
  });
}

  $('c-image-input').addEventListener('change', async e => {

    if ((cp.images || []).length >= 3) { toast(t('toast_max_image')); return; }

  });
}

/* link + name */
/* B1: single URL-sniffing function shared by the line-ad form, the canvas ad's link field, and
   link blocks — kind is one of 'yt' | 'x' | 'chip'. Returns { ok, cp, status, cls } where cp is
   the link object to store (or null) and status/cls are meant for a #link-status-style element. */
function parseLink(raw, label) {
  raw = (raw || '').trim();
  label = (label || '').trim();
  if (!raw) return { ok: true, cp: null, status: t('link_allow'), cls: '' };
  let u;
  try { u = new URL(raw.match(/^https?:\/\//) ? raw : 'https://' + raw); } catch (e) {
    return { ok: false, cp: null, status: t('link_bad_url'), cls: 'warn' };
  }
  const host = u.hostname.replace(/^www\./, '');
  const hit = HOSTS.find(([d]) => host === d || host.endsWith('.' + d));
  if (!hit) return { ok: false, cp: null, status: t('link_not_allowed', host), cls: 'warn' };
  const yt = (u.href.match(/(?:youtube\.com\/(?:watch\?[^#]*v=|shorts\/|embed\/|live\/)|youtu\.be\/)([\w-]{6,})/) || [])[1];
  if (yt) return { ok: true, cp: { kind: 'yt', id: yt, url: u.href, label }, status: t('link_yt'), cls: 'ok' };
  if (hit[1] === 'X') {
    const m = u.pathname.match(/^\/(\w{1,15})\/status\/\d+/);
    if (m) return { ok: true, cp: { kind: 'x', url: u.href, host: hit[1], handle: m[1], label }, status: t('link_x'), cls: 'ok' };
  }
  return { ok: true, cp: { kind: 'chip', url: u.href, host: hit[1], label: label || hit[1] }, status: t('link_chip', hit[1]), cls: 'ok' };
}

/* pen / eraser (normalized coords, survives size change) */
function redrawPen() {
  if (!penCanvas) return;
  const ctx = penCanvas.getContext('2d');
  ctx.clearRect(0, 0, penCanvas.width, penCanvas.height);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const W = penCanvas.width, Hh = penCanvas.height;
  for (const st of cp.strokes) {
    ctx.globalCompositeOperation = st.e ? 'destination-out' : 'source-over';
    ctx.strokeStyle = st.c;
    ctx.lineWidth = st.w * W;
    const pts = st.pts;
    if (pts.length === 1) {
      ctx.fillStyle = st.c;
      ctx.beginPath();
      ctx.arc(pts[0][0] * W, pts[0][1] * Hh, st.w * W / 2, 0, 7);
      ctx.fill();
      continue;
    }
    ctx.beginPath();
    ctx.moveTo(pts[0][0] * W, pts[0][1] * Hh);
    for (let i = 1; i < pts.length - 1; i++) {
      const mx = (pts[i][0] + pts[i + 1][0]) / 2 * W, my = (pts[i][1] + pts[i + 1][1]) / 2 * Hh;
      ctx.quadraticCurveTo(pts[i][0] * W, pts[i][1] * Hh, mx, my);
    }
    const last = pts[pts.length - 1];
    ctx.lineTo(last[0] * W, last[1] * Hh);
    ctx.stroke();
  }
  ctx.globalCompositeOperation = 'source-over';
}
function bindPen(cv) {
  let stroke = null;
  let strokePre = null;
  const norm = e => {
    const r = cv.getBoundingClientRect();
    return [(e.clientX - r.left) / r.width, (e.clientY - r.top) / r.height];
  };
  cv.addEventListener('pointerdown', e => {
    if (tool !== 'draw' && tool !== 'erase') return;
    try { cv.setPointerCapture(e.pointerId); } catch (err) {}
    const erase = tool === 'erase';
    strokePre = snapCP();
    stroke = {
      c: $('pen-color') ? $('pen-color').value : '#ffffff',
      w: (erase ? penW * 3 : penW) / SLOTS[cp.slot].W,
      e: erase,
      pts: [norm(e)],
    };
    cp.strokes.push(stroke);
    redrawPen();
    e.preventDefault();
  });
  cv.addEventListener('pointermove', e => {
    if (!stroke) return;
    stroke.pts.push(norm(e));
    redrawPen();
  });
  const up = () => {
    if (stroke && strokePre) commitInstant(strokePre); // commit point: one pen stroke complete
    stroke = null; strokePre = null;
  };
  cv.addEventListener('pointerup', up);
  cv.addEventListener('pointercancel', up);
}

function startTextEdit(el, idx) {
  stopTextEdit();
  const pre = snapCP();
  editingText = el;
  el.contentEditable = 'plaintext-only';
  if (el.contentEditable !== 'plaintext-only') el.contentEditable = 'true';
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  const s = getSelection(); s.removeAllRanges(); s.addRange(range);
  el.addEventListener('input', () => { cp.texts[idx].t = el.innerText.replace(/\n$/, ''); renderMiniPreview(); }, { passive: true });
  el.addEventListener('blur', () => {
    if (editingText === el) {

function stopTextEdit() {

function bindCanvasPointer(box) {
  let drag = null;
  box.addEventListener('pointerdown', e => {
    if (tool === 'draw' || tool === 'erase') return;
    if (e.target.closest('.ed-handle')) return;
    const target = e.target.closest('[data-kind]');
    const screen = box.querySelector('.screen');
    if (!screen) return;
    const r = screen.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width * 100;
    const py = (e.clientY - r.top) / r.height * 100;
    const inside = px >= 0 && px <= 100 && py >= 0 && py <= 100;

    if (tool === 'text') {
      if (editingText && target === editingText) return;
      if (target && target.dataset.kind === 'text') {
        e.preventDefault();
        selectEl('text', +target.dataset.idx);
        startTextEdit(target, +target.dataset.idx);
      } else if (inside && !editingText) {
        if (cp.texts.length >= 5) { toast(t('toast_max_text')); return; }
        e.preventDefault();
        cp.texts.push({ t: '', x: Math.max(6, Math.min(94, px)), y: Math.max(6, Math.min(94, py)), s: defText.s, c: defText.c, f: defText.f, r: 0, scale: 1 });
        rebuildPreview();
        const idx = cp.texts.length - 1;
        const el = box.querySelector('[data-kind="text"][data-idx="' + idx + '"]');
        selectEl('text', idx);
        if (el) startTextEdit(el, idx);
      } else if (editingText) {
        stopTextEdit();
      }
      return;
    }
    if (tool === 'sticker') {
      if (!inside) return;
      if (cp.stamps.length >= 12) { toast(t('toast_max_sticker')); return; }
      const pre = snapCP();
      cp.stamps.push({ ch: curSticker, x: Math.max(3, Math.min(97, px)), y: Math.max(3, Math.min(97, py)), r: Math.round(Math.random() * 24 - 12), s: 1.2 });
      commitInstant(pre); // commit point: element add
      rebuildPreview();
      selectEl('stamp', cp.stamps.length - 1);
      return;
    }
    if (tool === 'link') {
      if (!inside) return;
      cp.links = cp.links || [];
      if (cp.links.length >= 2) { toast(t('toast_max_link')); return; }
      const pre = snapCP();
      cp.links.push({ x: Math.max(8, Math.min(92, px)), y: Math.max(8, Math.min(92, py)), w: 26, label: '', url: '', kind: 'chip' });
      const idx = cp.links.length - 1;
      commitInstant(pre); // commit point: element add
      rebuildPreview();
      setTool('select');
      selectEl('link', idx);
      return;
    }
    if (!target) { clearSel(); renderCtx(); return; }
    const kind = target.dataset.kind, idx = +target.dataset.idx;
    selectEl(kind, idx);
    drag = { kind, idx, el: target, moved: false, sx: e.clientX, sy: e.clientY, pre: snapCP() };
    target.classList.add('drag');
    try { target.setPointerCapture(e.pointerId); } catch (err) {}
    e.preventDefault();
  });
  box.addEventListener('pointermove', e => {
    if (!drag) return;
    if (Math.hypot(e.clientX - drag.sx, e.clientY - drag.sy) > 4) drag.moved = true;
    if (!drag.moved) return;
    const screen = box.querySelector('.screen');
    const r = screen.getBoundingClientRect();
    let x = Math.max(2, Math.min(98, (e.clientX - r.left) / r.width * 100));
    let y = Math.max(2, Math.min(98, (e.clientY - r.top) / r.height * 100));
    let snapV = false, snapH = false;
    if (Math.abs(x - 50) <= 1.5) { x = 50; snapV = true; }
    if (Math.abs(y - 50) <= 1.5) { y = 50; snapH = true; }
    showSnapGuides(snapV, snapH);
    const d = arrFor(drag.kind)[drag.idx];
    if (!d) return;
    d.x = x; d.y = y;
    drag.el.style.left = x + '%';
    drag.el.style.top = y + '%';
    renderMiniPreview();
    updateHandles();
  });
  const end = () => {
    if (!drag) return;
    drag.el.classList.remove('drag');
    showSnapGuides(false, false);
    if (drag.moved) commitInstant(drag.pre); // commit point: drag end
    drag = null;
  };
  box.addEventListener('pointerup', end);
  box.addEventListener('pointercancel', end);
  box.addEventListener('dblclick', e => {
    if (tool !== 'select') return;
    const t2 = e.target.closest('[data-kind="text"]');
    if (t2) { selectEl('text', +t2.dataset.idx); startTextEdit(t2, +t2.dataset.idx); }
  });
}

    add(segBtns([['g', t('style_bold')], ['m', t('style_mono')], ['r', t('style_wide')]], v => defText.f === v, v => { defText.f = v; renderCtx(); }));
    const col = document.createElement('input');

/* D: export the whole store as a portable JSON file, and import one back (with a confirm + a
   basic shape check) — the manual bridge for moving data into the chrome-extension:// origin. */
function exportStoreData() {
  const payload = { v: 'devad.v5', exportedAt: Date.now(), store };
  const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'devad-data.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}
function handleImportFile(e) {
  const file = e.target.files && e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data.v !== 'devad.v5' || typeof data.store !== 'object' || data.store === null) throw new Error('bad shape');
      if (!window.confirm(t('data_import_confirm'))) return;
      localStorage.setItem(LS, JSON.stringify(data.store));
      location.reload();
    } catch (err) {
      toast(t('data_import_fail'));
    }
  };
  reader.onerror = () => toast(t('data_import_fail'));
  reader.readAsText(file);
}
function openGuidelines(tab) {
  glTab = tab || 1;
  buildGuidelines();
  $('gl-modal').classList.add('show');
}

document.addEventListener('keydown', e => {
  const composerOpen = $('composer').classList.contains('show');
  const editingField = e.target.matches('input, textarea, [contenteditable], [contenteditable="plaintext-only"]');
  if (composerOpen && !editingField) {
    const mod = e.ctrlKey || e.metaKey;
    if (mod && e.key.toLowerCase() === 'z') { e.preventDefault(); if (e.shiftKey) doRedo(); else doUndo(); return; }
    if (mod && e.key.toLowerCase() === 'y') { e.preventDefault(); doRedo(); return; }
    if (cp.slot !== 'line' && tool === 'select' && sel) {
      if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelected(); return; }
      if (mod && e.key.toLowerCase() === 'd') { e.preventDefault(); duplicateSelected(); return; }
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault(); nudgeSelected(e.key, e.shiftKey); return;
      }
    }
  }
  if (editingField) return;
  if (e.key === 'Escape') {
    if (composerOpen) closeComposer();
    else if ($('console').classList.contains('show')) closeConsole();
    else if ($('about').classList.contains('show')) closeAbout();
    else if ($('gallery').classList.contains('show')) closeGallery();
    else if ($('gl-modal').classList.contains('show')) closeGuidelines();
    else if (paintMode) exitPaint();
    return;
  }
  if (composerOpen || $('about').classList.contains('show') || $('console').classList.contains('show') || $('gallery').classList.contains('show')) return;
  if (e.key === ' ' || e.key === 'n' || e.key === 'N') { e.preventDefault(); if (surface === 'newtab') { drawAllSlots(); mountAllSlots(); } }
  if (e.key === 'p' || e.key === 'P') openComposer();
});

const qs = new URLSearchParams(location.search).get('surface');
if (qs && ['newtab', 'wallpaper', 'ticker', 'terminal', 'stream', 'taskbar'].includes(qs)) {
  surface = qs;
  document.querySelectorAll('.surf-chip').forEach(x => x.classList.toggle('sel', x.dataset.surf === qs));
}
buildChrome();
drawAllSlots();
if (surface === 'newtab') showNewtab(); else { refreshOtherSurfaceAd(); showSurface(); }
updateQueueDot();
startRotationTimers();
restartFeedCycle();
scheduleAmbientPaint();
scheduleAmbientSave();
scheduleTbRotate(); // C2: taskbar ad-module rotation
setInterval(tickTbClock, 30000); // C1: tray clock, refreshed at least once a minute
// keep the always-on mini preview's map thumbnail fresh once the editor first mounts
const _mpObs = new MutationObserver(() => { /* mini-preview is static-light now; nothing to repaint */ });
_mpObs.observe($('composer'), { attributes: true, attributeFilter: ['class'] });
if (!store.introSeen) openAbout();
})();
</script>
</body>
</html>
