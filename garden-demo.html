<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コメントの庭 — 実証デモ | DevNull Studio</title>
<meta name="description" content="チャットで育つ配信用の小さな庭。「草」で草が生え、「8888」で花火が上がる。画面の隅に置く常駐演出の実証デモ。">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#ffd24d; }
html,body { height:100%; }
body {
  background:#15161c;
  font-family:'Hiragino Sans','Noto Sans JP',-apple-system,sans-serif;
  color:#e8ecff;
  display:flex; flex-direction:column;
  overflow:hidden;
}
header {
  padding:10px 18px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid #2a2d3e; flex-wrap:wrap; gap:8px;
}
header .t { font-size:15px; font-weight:800; }
header .t span { color:var(--gold); }
header .sub { font-size:11px; color:#8a93b8; }
header .btns { display:flex; gap:8px; }

.wrap { flex:1; display:flex; min-height:0; }
.stage-wrap { flex:1.7; display:flex; flex-direction:column; min-width:0; padding:14px; }
.stage-label { font-size:11px; letter-spacing:0.2em; color:#8a93b8; margin-bottom:8px; }
.stage {
  position:relative; flex:1;
  background:#0d0f16;
  border-radius:12px; border:1px solid #2e3450;
  overflow:hidden; min-height:300px;
}
#fakegame { position:absolute; inset:0; }
.fake-label {
  position:absolute; top:46%; left:0; right:0; text-align:center;
  font-size:13px; color:rgba(255,255,255,0.22); letter-spacing:0.3em;
}
#garden { position:absolute; left:10px; bottom:10px; }

button {
  font-family:inherit; font-size:13px; font-weight:700;
  background:#2e3450; color:#e8ecff;
  border:1px solid #444b6e; border-radius:999px;
  padding:8px 18px; cursor:pointer;
}
button:hover { background:#3a4163; }
button.primary { background:var(--gold); border-color:var(--gold); color:#1d2030; }

.chat {
  width:min(340px,38vw);
  border-left:1px solid #2a2d3e;
  display:flex; flex-direction:column;
  background:#181818;
}
.chat-h { padding:10px 14px; border-bottom:1px solid #2a2d3e; }
.chat-h .ct { font-size:13px; font-weight:700; }
.chat-h .cs { font-size:10px; color:#8a93b8; margin-top:2px; line-height:1.6; }
.demo-row { display:flex; align-items:center; gap:8px; padding:8px 14px; border-bottom:1px solid #2a2d3e; font-size:12px; }
.demo-row label { display:flex; align-items:center; gap:6px; cursor:pointer; color:#cfd8e3; }
#msgs { flex:1; overflow-y:auto; padding:8px 12px; display:flex; flex-direction:column; gap:7px; font-size:12.5px; }
.m { display:flex; gap:7px; align-items:baseline; animation:pop .18s ease; }
@keyframes pop { from { opacity:0; transform:translateY(5px); } }
.m .a { width:19px; height:19px; border-radius:50%; flex-shrink:0; align-self:center; }
.m .n { color:#9e9e9e; font-size:11px; white-space:nowrap; }
.m .b { color:#eee; word-break:break-all; }
.m .b.hit { color:#aed581; font-weight:700; }
.ema-btn {
  margin-left:auto; flex-shrink:0;
  font-size:10px; padding:1px 7px;
  background:transparent; border:1px solid #3a3f55; border-radius:5px;
  color:#8a93b8; cursor:pointer; opacity:0;
  transition:opacity .15s;
}
.m:hover .ema-btn { opacity:1; }
.ema-btn:hover { color:var(--gold); border-color:var(--gold); background:transparent; }
.quick { display:flex; gap:6px; padding:0 12px 10px; flex-wrap:wrap; }
.quick button { font-size:12px; padding:6px 13px; }
.chat-in { border-top:1px solid #2a2d3e; padding:10px 12px; display:flex; gap:8px; }
.chat-in input {
  flex:1; background:#222530; border:1px solid #3a3f55; border-radius:999px;
  color:#fff; font-size:14px; padding:9px 16px; outline:none; font-family:inherit;
}
.chat-in input:focus { border-color:var(--gold); }

.legend {
  padding:9px 14px; border-top:1px solid #2a2d3e;
  font-size:10.5px; color:#8a93b8; line-height:1.9;
}
.legend b { color:#cfd8e3; }

@media (max-width:680px) {
  .wrap { flex-direction:column; }
  .chat { width:100%; border-left:none; border-top:1px solid #2a2d3e; height:45%; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="t">コメントの庭 <span>— 実証デモ</span></div>
    <div class="sub">画面の隅に置く常駐演出。配信を邪魔せず、たまに見ると育っている</div>
  </div>
  <div class="btns">
    <button id="btn-card" class="primary">📋 今日の庭カードを保存</button>
  </div>
</header>

<div class="wrap">
  <div class="stage-wrap">
    <div class="stage-label">▼ 配信プレビュー(中央=いつものゲーム画面、左下の庭だけがこのツール)</div>
    <div class="stage">
      <canvas id="fakegame"></canvas>
      <div class="fake-label">— ゲーム画面(配信の本編)—</div>
      <canvas id="garden"></canvas>
    </div>
  </div>

  <div class="chat">
    <div class="chat-h">
      <div class="ct">チャット欄(テスト用)</div>
      <div class="cs">あなたが視聴者です。本番ではYouTubeチャットを読み取ります。</div>
    </div>
    <div class="demo-row">
      <label><input type="checkbox" id="demo-toggle"> 自動デモ(偽視聴者約40人)</label>
      <span style="margin-left:auto; display:flex; gap:5px;">
        <button id="t-cho" style="font-size:11px; padding:4px 10px;">蝶</button>
        <button id="t-neko" style="font-size:11px; padding:4px 10px;">猫</button>
        <button id="t-hoshi" style="font-size:11px; padding:4px 10px;">星</button>
      </span>
    </div>
    <div id="msgs"></div>
    <div class="quick">
      <button data-say="草">「草」</button>
      <button data-say="8888">「8888」</button>
      <button data-say="かわいい">「かわいい」</button>
      <button data-say="こんにちは!">「こんにちは」</button>
    </div>
    <div class="chat-in">
      <input type="text" id="chat-input" placeholder="コメントを入力(例: 草)" autocomplete="off">
      <button class="primary" id="btn-send">送信</button>
    </div>
    <div class="legend">
      <b>草・w</b> → 草が生える　<b>8888</b> → 花火<br>
      <b>かわいい・すき・きれい</b> → 花が咲く<br>
      <b>はじめてのコメント</b> → 蛍が庭に住み着く(名前付き)<br>
      風・花びら・蝶は勝手に動く。夜は流れ星。<br>
      そして<b>チャットが静かになると、猫が遊びに来る</b>。<br>
      コメントの<b>「飾」を押すと絵馬になって庭に吊るされる</b>(配信者の承認制)。
    </div>
  </div>
</div>

<script>
'use strict';
(() => {

const $ = id => document.getElementById(id);
const rand = (a=1,b) => b===undefined ? Math.random()*a : a+Math.random()*(b-a);
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const TAU = Math.PI*2;

// ============================================================
// 偽のゲーム画面(配信本編のダミー)
// ============================================================
const fg = $('fakegame'), fgx = fg.getContext('2d');
function sizeFake(){
  const st = fg.parentElement.getBoundingClientRect();
  fg.width = st.width; fg.height = st.height;
}
function drawFake(t){
  fgx.fillStyle = '#10131d';
  fgx.fillRect(0,0,fg.width,fg.height);
  for (let i=0;i<5;i++){
    const x = (t*0.02*(i+1)) % (fg.width+200) - 100;
    fgx.fillStyle = `rgba(70,90,140,${0.05+i*0.012})`;
    fgx.beginPath();
    fgx.arc(x, fg.height*(0.2+i*0.13), 40+i*22, 0, TAU);
    fgx.fill();
  }
}

// ============================================================
// 庭 — 画面の隅のキャンバス
// ============================================================
const gc = $('garden'), g = gc.getContext('2d');
let GW = 320, GH = 190;
function sizeGarden(){
  const st = gc.parentElement.getBoundingClientRect();
  GW = Math.max(240, Math.min(380, st.width*0.32));
  GH = GW*0.58;
  gc.width = GW*2; gc.height = GH*2;
  gc.style.width = GW+'px'; gc.style.height = GH+'px';
  g.setTransform(2,0,0,2,0,0);
}
window.addEventListener('resize', () => { sizeFake(); sizeGarden(); });

const grass = [];    // {x, h, lean, born, hue}
const flowers = [];  // {x, h, born, hue}
const bugs = [];     // 蛍 {name, color, x, y, tx, ty, born, phase, label}
const sparks = [];   // 花火 {x,y,parts:[{x,y,vx,vy,life,col}], born}
let startT = performance.now();
const stats = { kusa:0, hana:0, hanabi:0, cho:0, neko:0 };
let lastChatT = performance.now();   // 静けさ検知(猫の出現バイアス)
let wind = 0, gust = 0;
const petals = [];                   // 流れる花びら
let butterfly = null;                // 蝶(一度に1匹)
let cat = null;                      // 猫(一度に1匹)
let shootingStar = null;
const emas = []; // 絵馬: 配信者が額装したコメント {name, text, born, slot}
let nextButterflyT = performance.now() + rand(15000, 35000);
let nextCatT = performance.now() + rand(45000, 80000);
let nextPetalT = 0;
let nextStarT = performance.now() + rand(30000, 60000);

function groundY(x){ // なだらかな丘
  return GH-14 - Math.sin((x/GW)*Math.PI)*14;
}

function addGrass(){
  stats.kusa++;
  if (grass.length > 130) grass.splice(Math.floor(rand(30)), 1);
  grass.push({ x:rand(10,GW-10), h:rand(9,20), lean:rand(-0.4,0.4), born:performance.now(), hue:rand(95,135) });
}
function addFlower(){
  stats.hana++;
  if (flowers.length > 28) flowers.shift();
  flowers.push({ x:rand(16,GW-16), h:rand(16,30), born:performance.now(), hue:pick([340,15,45,280,200]) });
}
function addFirework(){
  stats.hanabi++;
  const x = rand(GW*0.2,GW*0.8), y = rand(GH*0.15,GH*0.4);
  const parts = [];
  const hue = rand(360);
  for (let i=0;i<26;i++){
    const a = i/26*TAU, sp = rand(18,42);
    parts.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:rand(0.6,1.1), col:`hsl(${hue+rand(-20,20)},90%,70%)` });
  }
  sparks.push({ parts, born:performance.now() });
}
function addBug(name, color){
  if (bugs.find(b=>b.name===name)) return;
  if (bugs.length > 12) bugs.shift();
  bugs.push({ name, color, x:-12, y:rand(GH*0.3,GH*0.6), tx:rand(20,GW-20), ty:0, born:performance.now(), phase:rand(TAU), label:performance.now() });
  bugs[bugs.length-1].ty = groundY(bugs[bugs.length-1].tx) - rand(18,46);
}
function pokeBug(name){
  const b = bugs.find(b=>b.name===name);
  if (b) { b.label = performance.now(); b.tx = rand(20,GW-20); b.ty = groundY(b.tx)-rand(18,46); }
}

// ============================================================
// 生きている庭 — 常時/ときどき/まれ の3層
// ============================================================
function spawnButterfly(){
  stats.cho++;
  const fromLeft = Math.random() < 0.5;
  butterfly = {
    x: fromLeft ? -10 : GW + 10, dir: fromLeft ? 1 : -1,
    y: rand(GH * 0.25, GH * 0.55),
    hue: pick([330, 35, 200, 270]),
    state: 'fly', restT: 0, phase: rand(TAU),
  };
}
function spawnCat(){
  stats.neko++;
  const fromLeft = Math.random() < 0.5;
  cat = {
    x: fromLeft ? -30 : GW + 30, dir: fromLeft ? 1 : -1,
    state: 'walk',                    // walk → (sit → sleep?) → leave
    t: 0, sitT: rand(6000, 14000),
    tail: rand(TAU),
  };
}
function updateAmbient(now){
  // 風: ゆらぎ+時々突風
  gust *= 0.985;
  if (Math.random() < 0.004) gust = rand(1.5, 3);
  wind = Math.sin(now * 0.0004) * 0.7 + Math.sin(now * 0.0013) * 0.3 + gust;

  // 花びら
  if (now > nextPetalT){
    nextPetalT = now + rand(2500, 7000);
    petals.push({ x: -6, y: rand(6, GH * 0.5), rot: rand(TAU), hue: pick([340, 45, 20]) });
  }
  for (let i = petals.length - 1; i >= 0; i--){
    const p = petals[i];
    p.x += 0.35 + wind * 0.5;
    p.y += 0.18 + Math.sin(now * 0.003 + p.rot) * 0.25;
    p.rot += 0.02;
    if (p.x > GW + 10 || p.y > GH) petals.splice(i, 1);
  }

  // 蝶
  if (!butterfly && now > nextButterflyT) spawnButterfly();
  if (butterfly){
    const bf = butterfly;
    bf.phase += 0.012;
    if (bf.state === 'fly'){
      bf.x += bf.dir * 0.55;
      bf.y += Math.sin(bf.phase * 6) * 0.8;
      // 花があれば時々ひと休み
      if (flowers.length && Math.random() < 0.003){
        const f = pick(flowers);
        bf.state = 'rest'; bf.restT = now + rand(3000, 7000);
        bf.x = f.x; bf.y = groundY(f.x) - f.h - 4;
      }
      if (bf.x < -16 || bf.x > GW + 16){ butterfly = null; nextButterflyT = now + rand(20000, 50000); }
    } else if (now > bf.restT){
      bf.state = 'fly';
    }
  }

  // 猫 — 静かなチャットほど来やすい(沈黙の救済)
  const quiet = now - lastChatT > 12000;
  if (!cat && (now > nextCatT || (quiet && now > nextCatT - 30000))){
    spawnCat();
    nextCatT = now + rand(90000, 160000);
  }
  if (cat){
    cat.t += 16;
    cat.tail += 0.05;
    if (cat.state === 'walk'){
      cat.x += cat.dir * 0.42;
      const mid = cat.x > GW * 0.25 && cat.x < GW * 0.75;
      if (mid && Math.random() < 0.004){ cat.state = 'sit'; cat.t = 0; }
      if (cat.x < -34 || cat.x > GW + 34) cat = null;
    } else if (cat.state === 'sit'){
      if (cat.t > cat.sitT){
        if (Math.random() < 0.45){ cat.state = 'sleep'; cat.t = 0; cat.sitT = rand(9000, 18000); }
        else cat.state = 'walk';
      }
    } else if (cat.state === 'sleep'){
      if (cat.t > cat.sitT) cat.state = 'walk';
    }
  }

  // 流れ星(夕暮れ以降)
  const mins = (now - startT) / 60000;
  if (!shootingStar && mins > 0.6 && now > nextStarT){
    shootingStar = { x: rand(GW * 0.2, GW * 0.8), y: rand(6, GH * 0.2), t: 0 };
    nextStarT = now + rand(40000, 90000);
  }
  if (shootingStar){
    shootingStar.t += 16;
    if (shootingStar.t > 900) shootingStar = null;
  }

  // 蛍のダンス: まれに2匹が寄り添って旋回
  if (bugs.length >= 2 && Math.random() < 0.0008){
    const a2 = pick(bugs), b2 = pick(bugs);
    if (a2 !== b2){ a2.tx = b2.tx + rand(-10, 10); a2.ty = b2.ty + rand(-10, 10); }
  }
}

function drawAmbient(now){
  // 夜空の星(夕暮れが深まるほど)
  const mins = (now - startT) / 60000;
  const night = Math.min(1, Math.max(0, mins * 0.1 - 0.05));
  if (night > 0.05){
    for (let i = 0; i < 10; i++){
      const sx = (i * 53.7) % GW, sy = 6 + (i * 17.3) % (GH * 0.25);
      const tw = 0.3 + Math.abs(Math.sin(now * 0.001 + i * 2.1)) * 0.7;
      g.globalAlpha = night * tw * 0.8;
      g.fillStyle = '#fff8e0';
      g.fillRect(sx, sy, 1.6, 1.6);
    }
    g.globalAlpha = 1;
  }
  // 流れ星
  if (shootingStar){
    const t = shootingStar.t / 900;
    const x = shootingStar.x + t * 60, y = shootingStar.y + t * 26;
    g.strokeStyle = `rgba(255,250,220,${(1 - t) * 0.9})`;
    g.lineWidth = 1.4;
    g.beginPath(); g.moveTo(x - 16, y - 7); g.lineTo(x, y); g.stroke();
  }
  // 花びら
  for (const p of petals){
    g.save();
    g.translate(p.x, p.y); g.rotate(p.rot);
    g.fillStyle = `hsla(${p.hue},70%,78%,0.85)`;
    g.beginPath(); g.ellipse(0, 0, 3, 1.8, 0, 0, TAU); g.fill();
    g.restore();
  }
  // 蝶
  if (butterfly){
    const bf = butterfly;
    const flap = bf.state === 'rest'
      ? 0.25 + Math.sin(now * 0.004) * 0.15
      : Math.abs(Math.sin(now * 0.02));
    g.save();
    g.translate(bf.x, bf.y);
    g.fillStyle = `hsla(${bf.hue},75%,72%,0.95)`;
    g.beginPath(); g.ellipse(-3 * (0.3 + flap), 0, 3.4 * (0.3 + flap), 4, -0.35, 0, TAU); g.fill();
    g.beginPath(); g.ellipse( 3 * (0.3 + flap), 0, 3.4 * (0.3 + flap), 4,  0.35, 0, TAU); g.fill();
    g.fillStyle = '#2b241c';
    g.fillRect(-0.8, -3, 1.6, 6);
    g.restore();
  }
  // 猫 — 墨色のシルエット
  if (cat){
    const gy = groundY(cat.x) + 2;
    const bob = cat.state === 'walk' ? Math.sin(cat.x * 0.4) * 1 : 0;
    g.save();
    g.translate(cat.x, gy + bob);
    g.scale(cat.dir, 1);
    g.fillStyle = '#23201b';
    if (cat.state === 'sleep'){
      g.beginPath(); g.ellipse(0, -5, 13, 6, 0, 0, TAU); g.fill();          // 丸くなる
      g.beginPath(); g.arc(9, -8, 5, 0, TAU); g.fill();                      // 頭
      g.beginPath(); g.moveTo(6,-12); g.lineTo(8,-16); g.lineTo(10,-12); g.fill();
      g.beginPath(); g.moveTo(10,-12); g.lineTo(12.5,-15.5); g.lineTo(14,-11.5); g.fill();
      const zt = Math.floor(cat.t / 800) % 3;
      g.font = '600 8px sans-serif'; g.fillStyle = 'rgba(255,255,255,0.55)';
      g.scale(cat.dir, 1);
      g.fillText('z'.repeat(zt + 1), cat.dir > 0 ? 14 : -26, -20);
    } else {
      const sit = cat.state === 'sit';
      g.beginPath(); g.ellipse(0, sit ? -8 : -6, sit ? 7 : 11, sit ? 9 : 5.5, 0, 0, TAU); g.fill(); // 体
      g.beginPath(); g.arc(sit ? 0 : 9, sit ? -18 : -10, 5, 0, TAU); g.fill();                       // 頭
      const hx = sit ? 0 : 9, hy = sit ? -18 : -10;
      g.beginPath(); g.moveTo(hx-4.5,hy-3); g.lineTo(hx-3,hy-8); g.lineTo(hx-0.5,hy-4); g.fill();   // 耳
      g.beginPath(); g.moveTo(hx+0.5,hy-4); g.lineTo(hx+3,hy-8); g.lineTo(hx+4.5,hy-3); g.fill();
      // 闇で光る金の目(まばたき付き) — 夜背景での視認性も担う
      const blink = Math.sin(cat.t * 0.0011) > 0.96 ? 0.2 : 1;
      g.fillStyle = '#ffd24d';
      g.beginPath(); g.ellipse(hx - 2, hy - 0.5, 1.1, 1.1 * blink, 0, 0, TAU); g.fill();
      g.beginPath(); g.ellipse(hx + 2, hy - 0.5, 1.1, 1.1 * blink, 0, 0, TAU); g.fill();
      g.fillStyle = '#23201b';
      const tw2 = Math.sin(cat.tail) * 6;                                                            // しっぽ
      g.strokeStyle = '#23201b'; g.lineWidth = 2.4; g.lineCap = 'round';
      g.beginPath(); g.moveTo(sit ? 5 : -10, -5);
      g.quadraticCurveTo(sit ? 12 : -17, -10 + tw2 * 0.4, sit ? 10 : -19, -16 + tw2);
      g.stroke();
      if (!sit){ g.fillRect(-7,-2,2.4,4); g.fillRect(-2,-2,2.4,4); g.fillRect(3,-2,2.4,4); g.fillRect(7,-2,2.4,4); }
    }
    g.restore();
  }
}

function addEma(name, text){
  if (!stats.ema) stats.ema = 0;
  stats.ema++;
  if (emas.length >= 4) emas.shift();
  const used = emas.map(e => e.slot);
  let slot = 0;
  for (let i = 0; i < 4; i++) if (!used.includes(i)) { slot = i; break; }
  emas.push({ name, text, born: performance.now(), slot });
}

function drawEmas(now){
  for (const e of emas){
    const age = Math.min(1, (now - e.born) / 600);
    const x = GW * (0.16 + e.slot * 0.225);
    const hang = 14;
    const sway = (Math.sin(now * 0.0011 + e.slot * 2) * 3 + wind * 4) * (Math.PI / 180) * 3;
    g.save();
    g.translate(x, 0);
    g.rotate(sway);
    g.translate(0, hang * age);
    // 紐
    g.strokeStyle = 'rgba(200,180,140,0.5)';
    g.lineWidth = 1;
    g.beginPath(); g.moveTo(0, -hang); g.lineTo(0, 0); g.stroke();
    // 札
    const w = 58, h = 34;
    g.globalAlpha = age;
    g.fillStyle = '#c9a76a';
    g.strokeStyle = '#8a6f42';
    g.lineWidth = 1.2;
    g.beginPath();
    g.moveTo(-w/2, -2); g.lineTo(w/2, -2); g.lineTo(w/2, h-10);
    g.lineTo(0, h-2); g.lineTo(-w/2, h-10);
    g.closePath(); g.fill(); g.stroke();
    g.fillStyle = '#3a2f1d';
    g.font = '600 8.5px "Hiragino Sans",sans-serif';
    g.textAlign = 'center';
    const t = e.text.length > 9 ? e.text.slice(0, 8) + '…' : e.text;
    g.fillText(t, 0, 11);
    g.fillStyle = 'rgba(58,47,29,0.6)';
    g.font = '7px sans-serif';
    const n = e.name.length > 7 ? e.name.slice(0, 6) + '…' : e.name;
    g.fillText('— ' + n, 0, 22);
    g.globalAlpha = 1;
    g.restore();
  }
}

function drawGarden(now){
  g.clearRect(0,0,GW,GH);
  const mins = (now-startT)/60000;

  // 空気感: 時間経過でほんのり夕暮れる薄板
  g.fillStyle = `rgba(20,16,40,0.38)`;
  roundRect(g, 0, 0, GW, GH, 12); g.fill();
  const dusk = Math.min(0.22, mins*0.02);
  g.fillStyle = `rgba(255,140,80,${dusk})`;
  roundRect(g, 0, 0, GW, GH, 12); g.fill();

  // 丘
  g.fillStyle = '#1d2b22';
  g.beginPath();
  g.moveTo(0,GH);
  for (let x=0;x<=GW;x+=8) g.lineTo(x, groundY(x));
  g.lineTo(GW,GH);
  g.closePath(); g.fill();

  // 草
  for (const k of grass){
    const age = Math.min(1,(now-k.born)/600);
    const h = k.h * (1-Math.pow(1-age,3));
    const sway = Math.sin(now*0.0015 + k.x)*2 + wind * (2.2 + (k.x % 7) * 0.3);
    const gy = groundY(k.x);
    g.strokeStyle = `hsl(${k.hue},45%,${38+age*8}%)`;
    g.lineWidth = 1.6;
    g.beginPath();
    g.moveTo(k.x, gy);
    g.quadraticCurveTo(k.x + k.lean*6 + sway*0.4, gy - h*0.6, k.x + k.lean*10 + sway, gy - h);
    g.stroke();
  }

  // 花
  for (const f of flowers){
    const age = Math.min(1,(now-f.born)/900);
    const h = f.h*(1-Math.pow(1-age,3));
    const gy = groundY(f.x);
    const sway = Math.sin(now*0.0012+f.x)*2 + wind * 2.6;
    g.strokeStyle = 'hsl(120,30%,35%)';
    g.lineWidth = 1.6;
    g.beginPath(); g.moveTo(f.x,gy); g.quadraticCurveTo(f.x+sway*0.5, gy-h*0.6, f.x+sway, gy-h); g.stroke();
    const px = f.x+sway, py = gy-h;
    if (age>0.4){
      const pr = 3.6*Math.min(1,(age-0.4)/0.6);
      g.fillStyle = `hsl(${f.hue},75%,70%)`;
      for (let i=0;i<5;i++){
        const a = i/5*TAU + now*0.0003;
        g.beginPath(); g.arc(px+Math.cos(a)*pr, py+Math.sin(a)*pr, pr*0.9, 0, TAU); g.fill();
      }
      g.fillStyle = '#ffe9a8';
      g.beginPath(); g.arc(px,py,pr*0.7,0,TAU); g.fill();
    }
  }

  // 蛍(コメントした人)
  for (const b of bugs){
    b.x += (b.tx-b.x)*0.02;
    b.y += (b.ty-b.y)*0.02 + Math.sin(now*0.003+b.phase)*0.3;
    if (Math.random()<0.003){ b.tx = rand(20,GW-20); b.ty = groundY(b.tx)-rand(18,50); }
    const glow = 0.55 + Math.sin(now*0.004+b.phase)*0.45;
    const gr = g.createRadialGradient(b.x,b.y,0,b.x,b.y,9);
    gr.addColorStop(0, `rgba(255,220,120,${0.6*glow})`);
    gr.addColorStop(1, 'rgba(255,220,120,0)');
    g.fillStyle = gr;
    g.beginPath(); g.arc(b.x,b.y,9,0,TAU); g.fill();
    g.fillStyle = `hsl(48,100%,${60+glow*25}%)`;
    g.beginPath(); g.arc(b.x,b.y,2.2,0,TAU); g.fill();
    const la = 1 - Math.min(1,(now-b.label)/3000);
    if (la>0){
      g.globalAlpha = la;
      g.font = '600 9px sans-serif';
      g.textAlign = 'center';
      g.fillStyle = '#fff';
      g.fillText(b.name, b.x, b.y-9);
      g.globalAlpha = 1;
    }
  }

  // 花火
  for (let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    const t = (now-s.born)/1000;
    let alive = false;
    for (const p of s.parts){
      if (t>p.life) continue;
      alive = true;
      const px = p.x + p.vx*t, py = p.y + p.vy*t + 14*t*t;
      g.globalAlpha = 1 - t/p.life;
      g.fillStyle = p.col;
      g.fillRect(px-1, py-1, 2, 2);
    }
    g.globalAlpha = 1;
    if (!alive) sparks.splice(i,1);
  }

  drawEmas(now);
  drawAmbient(now);

  // 枠
  g.strokeStyle = 'rgba(255,255,255,0.14)';
  g.lineWidth = 1;
  roundRect(g, 0.5, 0.5, GW-1, GH-1, 12); g.stroke();
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}

// ============================================================
// コメント → 庭(本番はChatSourceがYouTube/わんコメに差し替わる)
// ============================================================
const seen = new Set();
function react(m){
  let hit = false;
  const t = m.text;
  if (!seen.has(m.name)){
    seen.add(m.name);
    addBug(m.name, m.color);
    hit = true;
  } else {
    pokeBug(m.name);
  }
  if (/草|^[wWｗＷ]+$|わろた|笑/.test(t)) { addGrass(); if (t.length>2) addGrass(); hit = true; }
  if (/888|８８８|ぱちぱち|パチパチ/.test(t)) { addFirework(); hit = true; }
  if (/かわい|可愛|すき|好き|きれい|綺麗|尊い|えらい/.test(t)) { addFlower(); hit = true; }
  return hit;
}

const chatListeners = [];
function onChat(fn){ chatListeners.push(fn); }
function emitChat(m){ for (const fn of chatListeners) fn(m); }
onChat(m => { lastChatT = performance.now(); renderMsg(m, react(m)); });

// チャット表示
const msgs = $('msgs');
function renderMsg(m, hit){
  const el = document.createElement('div');
  el.className = 'm';
  el.innerHTML = `<div class="a" style="background:${m.color}"></div>
    <div class="n">${esc(m.name)}</div><div class="b${hit?' hit':''}">${esc(m.text)}</div>
    <button class="ema-btn" title="このコメントを絵馬にして庭に飾る">飾</button>`;
  el.querySelector('.ema-btn').addEventListener('click', () => addEma(m.name, m.text));
  msgs.appendChild(el);
  while (msgs.children.length > 60) msgs.removeChild(msgs.firstChild);
  msgs.scrollTop = msgs.scrollHeight;
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// 手入力(あなた=視聴者)
const input = $('chat-input');
function sendManual(text){
  const t = (text ?? input.value).trim();
  if (!t) return;
  emitChat({ name:'あなた', text:t, color:'#ffd24d' });
  if (text===undefined){ input.value=''; input.focus(); }
}
$('btn-send').addEventListener('click', () => sendManual());
input.addEventListener('keydown', e => { if (e.key==='Enter') sendManual(); });
for (const b of document.querySelectorAll('.quick button')){
  b.addEventListener('click', () => sendManual(b.dataset.say));
}
