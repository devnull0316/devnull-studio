<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#efe8d8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>墨蛍 — SUMI HOTARU | DevNull Studio</title>
<meta name="description" content="墨蛍 — 筆で壁を描き、蛍を星へ導く。描いた墨は消えない。あなたの一局が一幅の墨絵になる。">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #efe8d8;
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif;
  color: #2b2620;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

#game { position: fixed; inset: 0; display: block; cursor: crosshair; }

/* ================= HUD ================= */
#hud {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 4;
  opacity: 0;
  transition: opacity 0.5s;
}
#hud.on { opacity: 1; }

#score {
  position: absolute;
  top: max(14px, env(safe-area-inset-top));
  left: 0; right: 0;
  text-align: center;
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 600;
  letter-spacing: 0.06em;
  color: #2b2620;
}
#sub {
  position: absolute;
  top: calc(max(14px, env(safe-area-inset-top)) + clamp(34px, 5vw, 50px));
  left: 0; right: 0;
  text-align: center;
  font-size: clamp(11px, 1.6vw, 14px);
  letter-spacing: 0.3em;
  color: rgba(43,38,32,0.55);
}
#sub .ren { color: #b3342e; font-weight: 600; }

#mubokuFx {
  position: absolute;
  top: 30%;
  left: 0; right: 0;
  text-align: center;
  font-size: clamp(34px, 7vw, 70px);
  font-weight: 700;
  letter-spacing: 0.2em;
  color: #b3342e;
  opacity: 0;
  transform: scale(1.3);
}
#mubokuFx.show {
  animation: muboku 1.4s ease-out forwards;
}

#hint {
  position: absolute;
  bottom: 18%;
  left: 0; right: 0;
  text-align: center;
  font-size: clamp(17px, 2.6vw, 24px);
  font-weight: 600;
  letter-spacing: 0.18em;
  color: #2b2620;
  text-shadow: 0 0 10px rgba(255,253,245,0.95), 0 0 22px rgba(255,253,245,0.9);
  opacity: 0;
  transition: opacity 0.5s;
  animation: none;
}
#hint.show { opacity: 1; animation: hintpulse 1.8s infinite; }
@keyframes hintpulse { 50% { opacity: 0.55; } }
@keyframes muboku {
  0% { opacity: 0; transform: scale(1.5); }
  15% { opacity: 1; transform: scale(1); }
  70% { opacity: 1; }
  100% { opacity: 0; transform: scale(0.96); }
}

/* ================= Overlays ================= */
.overlay {
  position: fixed; inset: 0;
  z-index: 6;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.45s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }

/* ---- Title ---- */
#title-screen { background: rgba(239,232,216,0.45); }
.title-inner {
  display: flex;
  align-items: center;
  gap: clamp(28px, 6vw, 80px);
  padding: 24px;
}
.title-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: clamp(64px, 13vw, 140px);
  font-weight: 700;
  color: #1d1a16;
  text-shadow: 0 1px 0 rgba(255,255,255,0.4);
  line-height: 1.08;
}
.title-side { max-width: 380px; }
.title-sub {
  font-size: clamp(11px, 1.6vw, 14px);
  letter-spacing: 0.55em;
  color: rgba(43,38,32,0.6);
  margin-bottom: 22px;
}
.title-diagram {
  display: block;
  margin: 0 0 14px;
  background: rgba(255,253,245,0.5);
  border-radius: 10px;
}
.title-rule {
  font-size: clamp(14px, 2.2vw, 18px);
  line-height: 2.3;
  color: #2b2620;
}
.title-rule b { color: #b3342e; font-weight: 700; }
.title-hint {
  margin-top: 18px;
  font-size: clamp(12px, 1.8vw, 15px);
  letter-spacing: 0.3em;
  color: rgba(43,38,32,0.65);
  animation: fade 1.6s infinite;
}
.mode-row {
  display: flex;
  gap: 12px;
  margin-top: 26px;
}
.mode-btn {
  flex: 1;
  font-family: inherit;
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 700;
  letter-spacing: 0.1em;
  color: #2b2620;
  background: rgba(255,253,245,0.55);
  border: 1.5px solid rgba(43,38,32,0.45);
  border-radius: 8px;
  padding: 14px 6px 10px;
  cursor: pointer;
  line-height: 1.3;
  transition: background 0.15s, transform 0.1s;
}
.mode-btn span {
  display: block;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.25em;
  color: rgba(43,38,32,0.55);

}
.mode-btn:hover { background: rgba(43,38,32,0.08); }
.mode-btn:active { transform: scale(0.96); }
.mode-btn[data-mode="aka"] { border-color: rgba(179,52,46,0.6); }
.mode-btn[data-mode="aka"], .mode-btn[data-mode="aka"] span { color: #8e2b26; }
.mode-btn.meguri {
  background: #b3342e;
  border-color: #b3342e;
  color: #f5efe2;
  font-size: clamp(22px, 3.4vw, 32px);
  letter-spacing: 0.3em;
  padding-left: 0.3em;
}
.mode-btn.meguri span { color: rgba(245,239,226,0.8); }
.mode-btn.meguri:hover { background: #c9453e; }
.endless-label {

@keyframes fade { 50% { opacity: 0.25; } }

}
.seal {

  background: #b3342e;

  writing-mode: vertical-rl;

  letter-spacing: 0.15em;
  padding: 8px 5px;
  border-radius: 3px;
  transform: rotate(2deg);
  box-shadow: 0 1px 4px rgba(80,30,20,0.3);
  margin-top: 18px;
}

/* ---- Game over: hanging scroll ---- */
#over-screen { background: rgba(28,24,20,0.88); flex-direction: column; }
#scrollwrap {
  display: flex;
  align-items: center;
  justify-content: center;

.over-stats .v { color: #e0b84e; font-weight: 700; }

.over-btns { margin-top: 26px; }
.btn {

  font-size: 14px;

.btn.primary { background: #b3342e; border-color: #b3342e; color: #f5efe2; }

@media (max-width: 700px), (max-height: 500px) {

#btn-fs {

  top: max(10px, env(safe-area-inset-top));

  line-height: 1;

  color: rgba(43,38,32,0.55);

.replay-link {

/* ---- gallery ---- */
#gallery-screen { background: rgba(28,24,20,0.92); }
.gallery-box {

.g-head {

.g-grid {

.g-card { position: relative; text-align: center; }
.g-card img {

.g-cap {

.foot-credit {

  pointer-events: none;
}

<body>

<canvas id="game"></canvas>

    </div>
    <div class="title-side">
      <div class="title-sub">SUMI — HOTARU</div>
      <svg class="title-diagram" width="250" height="96" viewBox="0 0 250 96" aria-hidden="true">
        <path d="M30 82 Q110 52 190 74" stroke="#1d1a16" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9"/>
        <path d="M52 12 L106 58" stroke="#c89b3c" stroke-width="2.5" stroke-dasharray="5 5" fill="none"/>
        <path d="M106 58 L196 30" stroke="#c89b3c" stroke-width="2.5" stroke-dasharray="5 5" fill="none"/>

<script>
'use strict';
(() => {

// ============================================================
// Canvas & layers
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const IS_TOUCH = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let W = 0, H = 0, DPR = 1, DIAG = 1, U = 1;

let paperC = null, paperX = null; // washi paper (persistent, scorch marks accumulate)
let inkC = null, inkX = null;     // player ink layer
let obsC = null, obsX = null;     // printed stage strokes (fixed terrain, never burns)

const $ = id => document.getElementById(id);
const ui = {
  hud: $('hud'), score: $('score'), sub: $('sub'), muboku: $('mubokuFx'), hint: $('hint'),
  title: $('title-screen'), over: $('over-screen'),
  overTitle: $('over-title'), overSub: $('over-sub'), meguriSub: $('meguri-sub'),
  overStats: $('over-stats'), scrollimg: $('scrollimg'),
  retry: $('btn-retry'), save: $('btn-save'), keep: $('btn-keep'),
};

const rand = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;

// ============================================================
// Washi paper generation
// ============================================================
function makePaper(w, h, dpr) {
  const c = document.createElement('canvas');
  c.width = Math.round(w * dpr); c.height = Math.round(h * dpr);
  const g = c.getContext('2d');
  g.scale(dpr, dpr);
  // base
  const base = g.createLinearGradient(0, 0, w, h);
  base.addColorStop(0, '#f2ecdc');
  base.addColorStop(0.5, '#ede5d2');
  base.addColorStop(1, '#e9e0ca');
  g.fillStyle = base;
  g.fillRect(0, 0, w, h);
  // mottling
  for (let i = 0; i < 90; i++) {
    const x = rand(w), y = rand(h), r = rand(20, Math.max(w, h) * 0.18);
    const grad = g.createRadialGradient(x, y, 0, x, y, r);
    const dark = Math.random() < 0.5;
    grad.addColorStop(0, dark ? 'rgba(180,165,135,0.05)' : 'rgba(255,252,240,0.06)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = grad;
    g.fillRect(x - r, y - r, r * 2, r * 2);
  }
  // fibers
  g.lineWidth = 0.7;
  for (let i = 0; i < 160; i++) {
    const x = rand(w), y = rand(h), len = rand(8, 50), a = rand(TAU);
    g.strokeStyle = Math.random() < 0.5 ? 'rgba(170,150,120,0.10)' : 'rgba(255,255,248,0.14)';
    g.beginPath();
    g.moveTo(x, y);
    g.quadraticCurveTo(
      x + Math.cos(a) * len * 0.5 + rand(-4, 4),
      y + Math.sin(a) * len * 0.5 + rand(-4, 4),
      x + Math.cos(a) * len, y + Math.sin(a) * len);
    g.stroke();
  }
  // speckles
  for (let i = 0; i < 260; i++) {
    g.fillStyle = 'rgba(140,120,90,' + rand(0.03, 0.1) + ')';
    g.fillRect(rand(w), rand(h), rand(0.5, 1.6), rand(0.5, 1.6));
  }
  // edge vignette
  const v = g.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.42, w / 2, h / 2, Math.max(w, h) * 0.74);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(120,95,60,0.13)');
  g.fillStyle = v;
  g.fillRect(0, 0, w, h);
  return c;
}

// ============================================================
// Layout / resize
// ============================================================
function layout() {
  const oldW = W, oldH = H;
  const oldInk = inkC, oldPaper = paperC;
  const newDPR = Math.min(window.devicePixelRatio || 1, IS_TOUCH ? 1.5 : 2);
  // layout-viewport units: pointer clientX/Y live in this coordinate
  // space, so canvas CSS size and bitmap must both be derived from it
  const newW = window.innerWidth, newH = window.innerHeight;
  if (newW === W && newH === H && newDPR === DPR && inkC) return;
  DPR = newDPR;
  W = newW;
  H = newH;
  DIAG = Math.hypot(W, H);
  U = Math.min(W, H);
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  paperC = makePaper(W, H, DPR);
  paperX = paperC.getContext('2d');

  inkC = document.createElement('canvas');
  inkC.width = canvas.width; inkC.height = canvas.height;
  inkX = inkC.getContext('2d');
  inkX.scale(DPR, DPR);

  const oldObs = obsC;
  obsC = document.createElement('canvas');
  obsC.width = canvas.width; obsC.height = canvas.height;
  obsX = obsC.getContext('2d');
  obsX.scale(DPR, DPR);

  if (oldInk && oldW > 0) {
    // preserve existing ink & scorches, stretched to the new size
    inkX.save(); inkX.setTransform(1, 0, 0, 1, 0, 0);
    inkX.drawImage(oldInk, 0, 0, inkC.width, inkC.height);

      obsX.drawImage(oldObs, 0, 0, obsC.width, obsC.height);
      obsX.restore();
    }
    const sx = W / oldW, sy = H / oldH;
    for (const s of segs) { s.ax *= sx; s.ay *= sy; s.bx *= sx; s.by *= sy; }

// ============================================================
// Audio — koto plucks (Karplus-Strong), drips, wind, fire
// ============================================================
let AC = null, master = null, noiseBuf = null;
const ksCache = new Map();

function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  master = AC.createGain();
  master.gain.value = 0.6;
  master.connect(AC.destination);
  const len = AC.sampleRate;
  noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  // distant wind
  const wind = AC.createBufferSource();
  wind.buffer = noiseBuf; wind.loop = true;
  const wf = AC.createBiquadFilter();
  wf.type = 'lowpass'; wf.frequency.value = 220; wf.Q.value = 0.4;
  const wg = AC.createGain(); wg.gain.value = 0.018;
  wind.connect(wf); wf.connect(wg); wg.connect(master);
  wind.start();
  scheduleDrip();
}

function ksPluck(midi) {
  const freq = 440 * Math.pow(2, (midi - 69) / 12);
  let buf = ksCache.get(midi);
  if (!buf) {
    const sr = AC.sampleRate;
    const N = Math.round(sr / freq);
    const dur = 1.6, len = Math.floor(sr * dur);
    buf = AC.createBuffer(1, len, sr);
    const out = buf.getChannelData(0);
    const ring = new Float32Array(N);
    for (let i = 0; i < N; i++) ring[i] = Math.random() * 2 - 1;
    let idx = 0;
    for (let i = 0; i < len; i++) {
      const cur = ring[idx];
      const nxt = ring[(idx + 1) % N];
      out[i] = cur;
      ring[idx] = (cur + nxt) * 0.5 * 0.9965;
      idx = (idx + 1) % N;
    }
    ksCache.set(midi, buf);
  }
  return buf;
}

function pluck(midi, vol, when) {
  if (!AC || muted) return;
  const s = AC.createBufferSource();
  s.buffer = ksPluck(midi);
  const g = AC.createGain();
  g.gain.value = vol;
  s.connect(g); g.connect(master);
  s.start(when || AC.currentTime);
}

function noiseHit(peak, dec, freq, hp) {
  if (!AC || muted) return;
  const t = AC.currentTime;
  const s = AC.createBufferSource(); s.buffer = noiseBuf; s.loop = true;
  const f = AC.createBiquadFilter();
  f.type = hp ? 'highpass' : 'lowpass';
  f.frequency.value = freq;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(peak, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dec);
  s.connect(f); f.connect(g); g.connect(master);
  s.start(t); s.stop(t + dec + 0.1);
}

function sine(f0, f1, peak, dec, type) {
  if (!AC || muted) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(f0, t);
  if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dec);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(peak, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dec);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + dec + 0.1);
}

function scheduleDrip() {
  if (!AC) return;
  setTimeout(() => {
    if (!muted && state !== 'over') sine(rand(900, 1400), rand(400, 600), 0.04, 0.5);
    scheduleDrip();
  }, rand(6000, 14000));
}

function mulberry32(a) {

function hintShow(txt) { ui.hint.textContent = txt; ui.hint.classList.add('show'); }
function hintHide() { ui.hint.classList.remove('show'); }

const fly = { x: 200, y: 200, vx: 1, vy: 0.4, sp: 0, r: 7, glow: 1, wob: rand(TAU), lastFx: 0 };

// ---- ink data ----
let segs = [];      // {ax,ay,bx,by,r,dead,dry,stroke}
let strokes = [];   // {segIdxs:[], dots:[], len, state:'live'|'fading', fadeT}
let grid = new Map();
const CELL = 80;

function gridKey(cx, cy) { return cy * 8192 + cx; }
function addToGrid(i) {
  const s = segs[i];
  const x0 = Math.floor((Math.min(s.ax, s.bx) - s.r) / CELL);
  const x1 = Math.floor((Math.max(s.ax, s.bx) + s.r) / CELL);
  const y0 = Math.floor((Math.min(s.ay, s.by) - s.r) / CELL);
  const y1 = Math.floor((Math.max(s.ay, s.by) + s.r) / CELL);
  for (let cy = y0; cy <= y1; cy++)
    for (let cx = x0; cx <= x1; cx++) {
      const k = gridKey(cx, cy);
      let arr = grid.get(k);
      if (!arr) { arr = []; grid.set(k, arr); }
      arr.push(i);
    }
}
function rebuildGrid() {
  grid = new Map();
  for (let i = 0; i < segs.length; i++) if (!segs[i].dead) addToGrid(i);
}
function nearbySegs(x, y, R) {
  const found = [];
  const x0 = Math.floor((x - R) / CELL), x1 = Math.floor((x + R) / CELL);
  const y0 = Math.floor((y - R) / CELL), y1 = Math.floor((y + R) / CELL);
  const seen = new Set();
  for (let cy = y0; cy <= y1; cy++)
    for (let cx = x0; cx <= x1; cx++) {
      const arr = grid.get(gridKey(cx, cy));
      if (!arr) continue;
      for (const i of arr) {
        if (seen.has(i)) continue;
        seen.add(i);
        if (!segs[i].dead) found.push(segs[i]);
      }
    }
  return found;
}
function segClosest(s, px, py) {
  const dx = s.bx - s.ax, dy = s.by - s.ay;
  const l2 = dx * dx + dy * dy;
  const t = l2 === 0 ? 0 : clamp(((px - s.ax) * dx + (py - s.ay) * dy) / l2, 0, 1);
  return { x: s.ax + dx * t, y: s.ay + dy * t };
}

// ============================================================
// Ink economy & brush
// ============================================================
let inkMax = 1, ink = 1, inkRegen = 1, brushDried = false, inkCap = 1;

function inkParams() {
  inkMax = U * 1.7;
  inkRegen = inkMax * M.regen;
  inkCap = inkMax * M.cap; // how much ink the paper can hold before old strokes dissolve
  fly.r = Math.max(6, U * 0.012);
}

let stroke = null; // {pts:[{x,y}], lastW}

function strokeStart(x, y) {
  if (ink < inkMax * 0.06) { brushDried = true; sfx.dry(); return; }
  stroke = { px: x, py: y, lastW: 0, n: 0, obj: { segIdxs: [], dots: [], len: 0, state: 'live', fadeT: 0 } };
  strokes.push(stroke.obj);
  sfx.brush();
}

function strokeMove(x, y, pressure) {
  if (!stroke) return;
  const dx = x - stroke.px, dy = y - stroke.py;
  const d = Math.hypot(dx, dy);
  if (d < 3.5) return;
  if (ink <= 0) { strokeEnd(); brushDried = true; sfx.dry(); return; }

  const cost = Math.min(d, ink);
  ink -= cost;
  inkUsedTotal += cost;
  usedInkThisStar = true;
  armed = true;
  if (tut === 0) { tut = 1; hintShow('蛍を ★ まで導こう'); }

  // brush width: slower = fatter; taper-in; pressure from Apple Pencil
  let w = clamp(11 - d * 0.28, 4.2, 11) * (U / 700 + 0.45);
  if (pressure && pressure > 0 && pressure !== 0.5) w *= 0.55 + pressure * 0.9;
  if (stroke.n < 3) w *= 0.45 + stroke.n * 0.2;
  const dry = ink < inkMax * 0.18;
  stroke.lastW = stroke.lastW ? lerp(stroke.lastW, w, 0.4) : w;
  w = stroke.lastW;

  const nx = x, ny = y;
  // never deposit ink on top of the firefly — it burns off
  const mid = { x: (stroke.px + nx) / 2, y: (stroke.py + ny) / 2 };
  const tooClose =
    Math.hypot(mid.x - fly.x, mid.y - fly.y) < fly.r + w / 2 + 10 ||
    Math.hypot(nx - fly.x, ny - fly.y) < fly.r + w / 2 + 10;

  if (!tooClose) {
    const s = { ax: stroke.px, ay: stroke.py, bx: nx, by: ny, r: w / 2, dead: false, dry, stroke: stroke.obj };
    segs.push(s);
    stroke.obj.segIdxs.push(segs.length - 1);
    stroke.obj.len += d;
    addToGrid(segs.length - 1);
    drawBrushSeg(inkX, s, dry);
    // permanent splatter belongs to the stroke so re-renders keep it
    if (!dry && d > 14 && Math.random() < 0.12) {
      const dot = { x: nx + rand(-9, 9), y: ny + rand(-9, 9), r: rand(0.6, 1.8) };
      stroke.obj.dots.push(dot);
      inkX.fillStyle = 'rgba(30,26,22,0.5)';
      inkX.beginPath(); inkX.arc(dot.x, dot.y, dot.r, 0, TAU); inkX.fill();
    }
  } else {
    for (let i = 0; i < 2; i++) {
      particles.push({ x: nx + rand(-4, 4), y: ny + rand(-4, 4), vx: rand(-20, 20), vy: rand(-30, -5), life: rand(0.2, 0.4), maxLife: 0.4, size: rand(1, 2.5), col: '255,180,80', grav: 0 });
    }
  }

  stroke.px = nx; stroke.py = ny;
  stroke.n++;
}

function strokeEnd() {
  if (stroke && stroke.obj.segIdxs.length === 0) {
    const i = strokes.indexOf(stroke.obj);
    if (i >= 0) strokes.splice(i, 1);
  }
  stroke = null;
}

function drawBrushSeg(g, s, dry, col) {
  col = col || '30,26,22';
  g.strokeStyle = dry ? 'rgba(' + col + ',0.55)' : 'rgba(' + col + ',0.92)';
  g.lineCap = 'round';
  g.lineWidth = s.r * 2;
  g.beginPath();
  g.moveTo(s.ax, s.ay);
  g.lineTo(s.bx, s.by);
  g.stroke();
  // bristle streaks
  const dx = s.bx - s.ax, dy = s.by - s.ay;
  const len = Math.hypot(dx, dy) || 1;
  const px = -dy / len, py = dx / len;
  g.lineWidth = Math.max(0.6, s.r * 0.32);
  for (const off of [-0.62, 0.55]) {
    g.strokeStyle = 'rgba(' + col + ',' + (dry ? 0.18 : 0.3) + ')';
    g.beginPath();
    g.moveTo(s.ax + px * s.r * off * 1.45, s.ay + py * s.r * off * 1.45);
    g.lineTo(s.bx + px * s.r * off * 1.45, s.by + py * s.r * off * 1.45);
    g.stroke();
  }
  // dry brush gaps (only safe on the ink layer — it erases pixels)
  if (dry && g === inkX && Math.random() < 0.5) {
    g.save();
    g.globalCompositeOperation = 'destination-out';
    g.fillStyle = 'rgba(0,0,0,0.5)';
    for (let i = 0; i < 3; i++) {
      const t = rand();
      g.fillRect(s.ax + dx * t + rand(-s.r, s.r), s.ay + dy * t + rand(-s.r, s.r), rand(1, 3), rand(1, 3));
    }
    g.restore();
  }
}

function renderInkLayer() {
  inkX.save();
  inkX.setTransform(1, 0, 0, 1, 0, 0);
  inkX.clearRect(0, 0, inkC.width, inkC.height);
  inkX.restore();
  for (const st of strokes) {
    if (st.state !== 'live') continue;
    for (const i of st.segIdxs) {
      const s = segs[i];
      if (!s.dead) drawBrushSeg(inkX, s, s.dry);
    }
    inkX.fillStyle = 'rgba(30,26,22,0.5)';
    for (const dot of st.dots) {
      inkX.beginPath(); inkX.arc(dot.x, dot.y, dot.r, 0, TAU); inkX.fill();
    }
  }
}

// the paper holds only so much ink — beyond that, the oldest strokes
// shimmer in warning, lose their solidity, then dissolve to mist
function enforceInkBudget(dt) {
  let total = 0;
  for (const st of strokes) if (st.state === 'live') total += st.len;
  if (total > inkCap) {
    for (const st of strokes) {
      if (st.state === 'live' && st.len > 0) {
        st.state = 'fading';
        st.fadeT = 0;
        renderInkLayer(); // off the static layer; drawn dynamically while it fades
        break;
      }
    }
  }
  for (let i = strokes.length - 1; i >= 0; i--) {
    const st = strokes[i];
    if (st.state !== 'fading') continue;
    const was = st.fadeT;
    st.fadeT += dt;
    if (was < 0.55 && st.fadeT >= 0.55) {
      // solidity ends here: the firefly passes through from now on
      for (const k of st.segIdxs) segs[k].dead = true;
      rebuildGrid();
    }
    if (st.fadeT < 0.55) continue;
    if (st.fadeT >= 1.35) {
      // ink mist
      for (const k of st.segIdxs) {
        const s = segs[k];
        if (Math.random() < 0.4) particles.push({ x: (s.ax + s.bx) / 2, y: (s.ay + s.by) / 2, vx: rand(-12, 12), vy: rand(-26, -6), life: rand(0.4, 0.9), maxLife: 0.9, size: rand(1.5, 3.5), col: '90,84,74', grav: -14 });
      }
      strokes.splice(i, 1);
    }
  }
}

// ============================================================
// Stage terrain — printed sumi strokes, generated per night
// ============================================================
const OBS_COL = '92,64,40'; // warm sepia: clearly not the player's ink

function genObstacles(n) {
  const rng = mulberry32(n * 2654435761 + 11);
  const R = (a, b) => a + rng() * (b - a);
  const count = Math.min(2 + Math.floor(n / 3), 7);
  const px0 = W * 0.5, py0 = H * 0.62, protectR = U * 0.24; // firefly start
  let placed = 0, attempts = 0;
  while (placed < count && attempts < 50) {
    attempts++;
    const kind = Math.floor(R(0, 4));
    const cx = R(W * 0.14, W * 0.86), cy = R(H * 0.16, H * 0.82);
    if (Math.hypot(cx - px0, cy - py0) < protectR + U * 0.12) continue;
    const pts = [];
    if (kind === 0) {            // 一筆 — a sweeping stroke
      const len = R(U * 0.2, U * 0.42), a = R(0, Math.PI), bow = R(-U * 0.04, U * 0.04);
      const n2 = 10;
      for (let i = 0; i <= n2; i++) {
        const t = i / n2 - 0.5;
        pts.push([
          cx + Math.cos(a) * len * t - Math.sin(a) * bow * Math.sin((t + 0.5) * Math.PI),
          cy + Math.sin(a) * len * t + Math.cos(a) * bow * Math.sin((t + 0.5) * Math.PI),
        ]);
      }
    } else if (kind === 1) {     // 圓相 — an open circle
      const r0 = R(U * 0.07, U * 0.15), a0 = R(0, TAU), span = R(TAU * 0.55, TAU * 0.85);
      const n2 = 16;
      for (let i = 0; i <= n2; i++) {
        const a = a0 + span * i / n2;
        pts.push([cx + Math.cos(a) * r0, cy + Math.sin(a) * r0]);
      }
    } else if (kind === 2) {     // 山影 — a mountain ridge
      const wHalf = R(U * 0.12, U * 0.26), hPk = R(U * 0.06, U * 0.13);
      pts.push([cx - wHalf, cy]);
      pts.push([cx - wHalf * 0.3, cy - hPk]);
      pts.push([cx + wHalf * 0.15, cy - hPk * 0.45]);
      pts.push([cx + wHalf * 0.55, cy - hPk * 0.8]);
      pts.push([cx + wHalf, cy]);
    } else {                     // 竹 — a bamboo stalk
      const len = R(U * 0.16, U * 0.32), lean = R(-0.12, 0.12);
      const n2 = 6;
      for (let i = 0; i <= n2; i++) {
        const t = i / n2 - 0.5;
        pts.push([cx + lean * len * t, cy + len * t]);
      }
    }
    for (let i = 0; i < pts.length - 1; i++) {
      const taper = Math.sin((i + 0.5) / (pts.length - 1) * Math.PI);
      const s = {
        ax: pts[i][0], ay: pts[i][1], bx: pts[i + 1][0], by: pts[i + 1][1],
        r: 3 + taper * 3.5, dead: false, dry: false, fixed: true,
      };
      segs.push(s);
      drawBrushSeg(obsX, s, false, OBS_COL);
    }
    placed++;
  }
  rebuildGrid();
  // hang golden bells on the terrain: ringing one buys time (+2.5s).
  // This turns obstacles from "things to avoid" into "places worth a detour"
  bells = [];
  if (n >= 2) {
    const obsSegs = segs.filter(sg => sg.fixed);
    const want = Math.min(1 + Math.floor(n / 6), 2);
    for (let i = 0; i < want && obsSegs.length > 0; i++) {
      const sg = obsSegs[Math.floor(rng() * obsSegs.length)];
      const mx = (sg.ax + sg.bx) / 2, my = (sg.ay + sg.by) / 2;
      const dx = sg.bx - sg.ax, dy = sg.by - sg.ay;
      const len = Math.hypot(dx, dy) || 1;
      const side = rng() < 0.5 ? 1 : -1;
      const br = Math.max(7, U * 0.013);
      bells.push({
        x: mx + (-dy / len) * side * (sg.r + br + 4),
        y: my + (dx / len) * side * (sg.r + br + 4),
        r: br, used: false,
      });
    }
  }
}

// ============================================================
// Star
// ============================================================
function spawnStar() {
  const m = U * 0.12;
  // stage mode: the same night always deals the same stars (replayable);
  // endless keeps true randomness
  const R = (gameMode === 'meguri' && nightRng) ? nightRng : Math.random;
  const r = Math.max(9, fly.r * 1.5);
  // the gold ring IS the hitbox; it starts generous and tightens as
  // you improve (fixed per star — a shrinking target mid-flight would
  // feel unfair)
  const hitR = r * Math.max(M.hitFloor, M.hit0 - stars * M.hitDec);
  const clearance = hitR + fly.r + 8; // the whole ring must stay reachable
  let bestPt = null, bestScore = -1;
  const det = R !== Math.random; // deterministic (stage) placement
  for (let i = 0; i < 34; i++) {
    const x = m + R() * (W - 2 * m), y = m + H * 0.08 + R() * (H - 2 * m - H * 0.08);
    // spacing reference: in stage mode use the previous star's position
    // (deterministic) instead of the firefly's exact contact point
    const ref = det && lastStarPt ? lastStarPt : fly;
    const dFly = Math.hypot(x - ref.x, y - ref.y);
    if (dFly < DIAG * (det ? 0.25 : 0.3) && i < 24) continue;
    const segsToCheck = nearbySegs(x, y, clearance + 70);
    let clutter = 0, minD = 1e9;
    for (const s of segsToCheck) {
      if (det && !s.fixed) continue; // judge only terrain in stage mode
      const c = segClosest(s, x, y);
      const d = Math.hypot(c.x - x, c.y - y) - s.r;
      minD = Math.min(minD, d);
      if (d < clearance + 70) clutter += (clearance + 70 - d);
    }
    if (minD < clearance && i < 30) continue; // never bury the ring in terrain
    if (det && minD >= clearance) { bestPt = { x, y }; break; } // first valid = fixed sequence
    const sc = dFly * 0.5 - clutter * 2.5 + (minD < clearance ? -5000 : 0);
    if (sc > bestScore) { bestScore = sc; bestPt = { x, y }; }
  }
  if (!bestPt) bestPt = { x: W / 2, y: H / 2 };
  lastStarPt = { x: bestPt.x, y: bestPt.y };
  star = { x: bestPt.x, y: bestPt.y, r, hitR, born: playT };
  countMax = Math.max(M.tFloor, M.t0 - stars * M.tDec);
  countT = countMax;
  usedInkThisStar = false;
  lastTickSec = -1;
  for (const b of bells) b.used = false; // each new star re-arms the bells
}

function collectStar() {
  if (tut < 2) { tut = 2; hintHide(); }
  fracSum += clamp(countT / countMax, 0, 1); // for the night rating
  const muboku = !usedInkThisStar && stars > 0;
  combo = (countT / countMax > 0.45) ? combo + 1 : 1;
  maxCombo = Math.max(maxCombo, combo);
  const mult = 1 + (combo - 1) * 0.25;
  let gain = Math.round((100 + countT * 20) * mult);
  if (muboku) gain *= 2;
  score += gain;
  stars++;

  popups.push({ x: star.x, y: star.y - 30, txt: '+' + gain, t: 0, col: '#9a7b22' });
  if (muboku) {
    ui.muboku.classList.remove('show');
    void ui.muboku.offsetWidth;
    ui.muboku.classList.add('show');
  }
  // gold burst
  for (let i = 0; i < 36; i++) {
    const a = rand(TAU), sp = rand(30, U * 0.4);
    particles.push({ x: star.x, y: star.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30, life: rand(0.4, 1.1), maxLife: 1.1, size: rand(1.5, 4), col: '224,184,78', grav: 60 });
  }
  burns.push({ x: star.x, y: star.y, R: U * 0.17, t: 0, scorched: false });
  sfx.star();
  setTimeout(() => { if (state === 'play') sfx.burn(); }, 140);
  if (gameMode === 'meguri' && stars >= nightGoal) {
    star = null;
    countT = 999;                // the night is won; nothing left to time
    nightClearPending = 0.9;     // let the burn bloom before the dawn
  } else {
    spawnStar();
  }
}

// burn: erase ink in an expanding circle, leave a scorch ghost on paper
function updateBurns(dt) {
  for (let i = burns.length - 1; i >= 0; i--) {
    const b = burns[i];
    b.t += dt;
    const p = Math.min(1, b.t / 0.55);
    const r = b.R * (0.2 + 0.8 * (1 - Math.pow(1 - p, 2)));
    // erase ink
    inkX.save();
    inkX.globalCompositeOperation = 'destination-out';
    const g = inkX.createRadialGradient(b.x, b.y, r * 0.5, b.x, b.y, r);
    g.addColorStop(0, 'rgba(0,0,0,1)');
    g.addColorStop(1, 'rgba(0,0,0,0.25)');
    inkX.fillStyle = g;
    inkX.beginPath(); inkX.arc(b.x, b.y, r, 0, TAU); inkX.fill();
    inkX.restore();
    // embers on the rim
    if (p < 0.9) {
      for (let k = 0; k < 3; k++) {
        const a = rand(TAU);
        particles.push({ x: b.x + Math.cos(a) * r, y: b.y + Math.sin(a) * r, vx: rand(-15, 15), vy: rand(-45, -10), life: rand(0.25, 0.6), maxLife: 0.6, size: rand(1, 2.4), col: '255,150,60', grav: -20 });
      }
    }
    if (p >= 1) {
      // any stroke touching the flame loses that part
      let killed = false;
      for (const s of segs) {
        if (s.dead || s.fixed) continue; // printed terrain never burns
        const mx = (s.ax + s.bx) / 2, my = (s.ay + s.by) / 2;
        if (Math.hypot(s.ax - b.x, s.ay - b.y) < b.R ||
            Math.hypot(s.bx - b.x, s.by - b.y) < b.R ||
            Math.hypot(mx - b.x, my - b.y) < b.R) {
          s.dead = true;
          killed = true;
          if (s.stroke) s.stroke.len -= Math.hypot(s.bx - s.ax, s.by - s.ay);
        }
      }
      if (killed) { rebuildGrid(); renderInkLayer(); }
      // permanent scorch ghost on the paper itself
      if (!b.scorched) {
        b.scorched = true;
        paperX.save();
        paperX.strokeStyle = 'rgba(150,100,50,0.10)';
        paperX.lineWidth = 5;
        paperX.beginPath(); paperX.arc(b.x, b.y, b.R * 0.96, 0, TAU); paperX.stroke();
        paperX.fillStyle = 'rgba(190,150,90,0.05)';
        paperX.beginPath(); paperX.arc(b.x, b.y, b.R * 0.9, 0, TAU); paperX.fill();
        paperX.restore();
      }
      burns.splice(i, 1);
    }
  }
}

// ============================================================
// Firefly physics
// ============================================================
function flySpeed() { return U * M.spd * Math.min(M.accelCap, 1 + stars * M.accel); }

function updateFly(dt) {
  // smooth acceleration instead of stepping when a star is collected
  fly.sp = fly.sp ? fly.sp + (flySpeed() - fly.sp) * Math.min(1, dt * 1.5) : flySpeed();
  const sp = fly.sp;
  const sub = 4, h = dt / sub;
  for (let s = 0; s < sub; s++) {
    if (star) {
      const d2s = Math.hypot(star.x - fly.x, star.y - fly.y);
      // no passive far-field pull anymore: planned banks fly true.
      // attraction is a tool — hold a still finger to call the firefly
      const nearR = U * 0.12;
      let w = d2s < nearR ? lerp(0.35, 0.1, d2s / nearR) : 0;
      if (praying) w = Math.max(w, M.photoNear * 0.7);
      if (w > 0) {
        const want = Math.atan2(star.y - fly.y, star.x - fly.x);
        const cur = Math.atan2(fly.vy, fly.vx);
        let dAng = want - cur;
        while (dAng > Math.PI) dAng -= TAU;
        while (dAng < -Math.PI) dAng += TAU;
        const turn = clamp(dAng, -w * h, w * h);
        const na = cur + turn;
        fly.vx = Math.cos(na); fly.vy = Math.sin(na);
      }
    }
    fly.x += fly.vx * sp * h;
    fly.y += fly.vy * sp * h;
    // walls
    const m = 5 + fly.r;
    let bounced = false;
    if (fly.x < m) { fly.x = m; if (fly.vx < 0) { fly.vx *= -1; bounced = true; } }
    if (fly.x > W - m) { fly.x = W - m; if (fly.vx > 0) { fly.vx *= -1; bounced = true; } }
    if (fly.y < m) { fly.y = m; if (fly.vy < 0) { fly.vy *= -1; bounced = true; } }
    if (fly.y > H - m) { fly.y = H - m; if (fly.vy > 0) { fly.vy *= -1; bounced = true; } }
    // ink collision (2 iterations for corners)
    for (let it = 0; it < 2; it++) {
      const near = nearbySegs(fly.x, fly.y, fly.r + 14);
      let hit = null, hitD = 1e9, hc = null;
      for (const sg of near) {
        const c = segClosest(sg, fly.x, fly.y);
        const d = Math.hypot(c.x - fly.x, c.y - fly.y);
        const R = sg.r + fly.r;
        if (d < R && d < hitD) { hit = sg; hitD = d; hc = c; }
      }
      if (!hit) break;
      const d = hitD || 0.001;
      const nx = (fly.x - hc.x) / d, ny = (fly.y - hc.y) / d;
      const R = hit.r + fly.r;
      fly.x = hc.x + nx * (R + 0.5);
      fly.y = hc.y + ny * (R + 0.5);
      const dot = fly.vx * nx + fly.vy * ny;
      if (dot < 0) {
        // perfectly deterministic reflection — planned banks always land;
        // phototaxis (not randomness) is what breaks repeating loops
        fly.vx -= 2 * dot * nx;
        fly.vy -= 2 * dot * ny;
        bounced = true;
      }
    }
    if (bounced && performance.now() - fly.lastFx > 80) {
      fly.lastFx = performance.now();
      sfx.bounce(fly.y, sp);
      for (let k = 0; k < 3; k++)
        particles.push({ x: fly.x, y: fly.y, vx: rand(-40, 40), vy: rand(-40, 40), life: rand(0.15, 0.4), maxLife: 0.4, size: rand(0.8, 2), col: '255,205,90', grav: 0 });
    }
  }
  fly.wob += dt * 7;
  trail.unshift({ x: fly.x, y: fly.y });
  if (trail.length > 26) trail.pop();

  // star collection — touching the gold ring counts
  if (star && Math.hypot(fly.x - star.x, fly.y - star.y) < fly.r + star.hitR) collectStar();

  // bells: a detour that buys time
  for (const b of bells) {
    if (b.used) continue;
    if (Math.hypot(fly.x - b.x, fly.y - b.y) < fly.r + b.r + 2) {
      b.used = true;
      countT = Math.min(countMax, countT + 2.5);
      popups.push({ x: b.x, y: b.y - b.r - 8, txt: '+2.5秒', t: 0, col: '#9a7b22' });
      for (let k = 0; k < 14; k++) {
        const a2 = rand(TAU), sp2 = rand(20, U * 0.18);
        particles.push({ x: b.x, y: b.y, vx: Math.cos(a2) * sp2, vy: Math.sin(a2) * sp2 - 20, life: rand(0.3, 0.7), maxLife: 0.7, size: rand(1, 2.6), col: '224,184,78', grav: 40 });
      }
      if (AC && !muted) { pluck(74, 0.3, AC.currentTime); pluck(79, 0.24, AC.currentTime + 0.07); }
    }
  }
}

// ============================================================
// Flow
// ============================================================
function startGame() {
  state = 'play';
  if (gameMode === 'meguri') {
    M = makeNightParams(nightN);
    nightGoal = nightGoalFor(nightN);
  }
  nightClearPending = 0;
  fracSum = 0;
  bells = [];
  score = 0; stars = 0; combo = 0; maxCombo = 0;
  playT = 0; inkUsedTotal = 0;
  segs = []; strokes = []; grid = new Map();
  particles = []; burns = []; popups = []; trail = [];
  paperC = makePaper(W, H, DPR);
  paperX = paperC.getContext('2d');
  inkX.save(); inkX.setTransform(1, 0, 0, 1, 0, 0);
  inkX.clearRect(0, 0, inkC.width, inkC.height);
  inkX.restore();
  obsX.save(); obsX.setTransform(1, 0, 0, 1, 0, 0);
  obsX.clearRect(0, 0, obsC.width, obsC.height);
  obsX.restore();
  inkParams();
  ink = inkMax;
  brushDried = false;
  fly.x = W * 0.5; fly.y = H * 0.62;
  const a = rand(TAU);
  fly.vx = Math.cos(a); fly.vy = Math.sin(a);
  fly.glow = 1;
  fly.sp = 0;
  armed = false;
  if (gameMode === 'meguri') {
    genObstacles(nightN);
    nightRng = mulberry32(nightN * 7919 + 101);
  } else {
    nightRng = null;
  }
  lastStarPt = { x: W * 0.5, y: H * 0.62 }; // = the firefly's fixed start
  spawnStar();
  countT = countMax = M.t0 + 3; // generous first star; frozen until the first stroke
  tut = (gameMode === 'meguri' && nightN > 1) ? 1 : 0; // hints only where they help
  titleStar = null;
  if (tut === 0) hintShow('指で線を描いてみよう'); else hintHide();
  ui.title.classList.add('hidden');
  ui.over.classList.add('hidden');
  ui.hud.classList.add('on');
}

function nightClear() {
  state = 'clear';
  overAt = performance.now();
  bestNight = Math.max(bestNight, nightN + 1);
  localStorage.setItem('sumihotaru_night', bestNight);
  if (AC && !muted) {
    const t = AC.currentTime;
    [62, 67, 70, 74, 79].forEach((m, i) => pluck(m, 0.26, t + i * 0.16));
  }
  composeScroll();
  const r = ratingFor();
  const ratings = loadRatings();
  if (r > (ratings[nightN] || 0)) { ratings[nightN] = r; localStorage.setItem('sumihotaru_rating', JSON.stringify(ratings)); }
  galleryCaption = '第' + nightN + '夜 ' + RATING_TXT[r];
  ui.overTitle.textContent = '夜明け';
  ui.overTitle.style.color = '#e0b84e';
  ui.overTitle.style.textShadow = '0 0 26px rgba(224,184,78,0.55)';
  ui.overSub.textContent = 'NIGHT ' + nightN + ' — CLEAR';
  ui.retry.textContent = '次の夜へ';
  ui.overStats.innerHTML =
    '<span class="v">第' + nightN + '夜</span>、明けた　評価 <span class="v">' + RATING_TXT[r] + '</span><br>' +
    'スコア <span class="v">' + Math.floor(score).toLocaleString() + '</span>　コンボ <span class="v">×' + maxCombo + '</span><br>' +
    '時間 <span class="v">' + Math.floor(playT / 60) + '分' + Math.floor(playT % 60) + '秒</span>';
  ui.over.classList.remove('hidden');
  ui.hud.classList.remove('on');
}

function die() {
  state = 'dying';
  dieT = 0;
  strokeEnd();
  sfx.over();
}

function finishGameOver() {
  state = 'over';
  overAt = performance.now();
  ui.overTitle.textContent = '灯が、消えた';
  ui.overTitle.style.color = '';
  ui.overTitle.style.textShadow = '';
  ui.overSub.textContent = 'THE LIGHT HAS FADED';
  ui.retry.textContent = 'もう一度';
  const s = Math.floor(score);
  composeScroll();
  galleryCaption = gameMode === 'meguri'
    ? '第' + nightN + '夜 道半ば'
    : M.name + ' スコア ' + s.toLocaleString();
  if (gameMode === 'meguri') {
    ui.overStats.innerHTML =
      '<span class="v">第' + nightN + '夜</span>にて　星 <span class="v">' + stars + '/' + nightGoal + '</span><br>' +
      'スコア <span class="v">' + s.toLocaleString() + '</span>　コンボ <span class="v">×' + maxCombo + '</span><br>' +
      '最高 <span class="v">第' + bestNight + '夜</span>';
  } else {
    const newBest = s > best;
    if (newBest) { best = s; localStorage.setItem('sumihotaru_best_' + modeKey, s); }
    ui.overStats.innerHTML =
      'スコア <span class="v">' + s.toLocaleString() + '</span>' +
      (newBest ? '<span class="new">新記録</span>' : '') + '<br>' +
      '夜 <span class="v">' + M.name + '</span>　星 <span class="v">' + stars + '</span>　連 <span class="v">×' + maxCombo + '</span><br>' +
      '時間 <span class="v">' + Math.floor(playT / 60) + '分' + Math.floor(playT % 60) + '秒</span><br>' +
      '過去最高 <span class="v">' + best.toLocaleString() + '</span>';
  }
  ui.over.classList.remove('hidden');
  ui.hud.classList.remove('on');
}

// ---- 掛け軸 (hanging scroll) compositor ----
function makeScroll() {
  const sw = 640, sh = 960;
  const c = document.createElement('canvas');
  c.width = sw; c.height = sh;
  const g = c.getContext('2d');
  // cloth mount
  const cloth = g.createLinearGradient(0, 0, sw, 0);
  cloth.addColorStop(0, '#2c3046');
  cloth.addColorStop(0.5, '#3a3f5c');
  cloth.addColorStop(1, '#2c3046');
  g.fillStyle = cloth;
  g.fillRect(0, 0, sw, sh);
  g.fillStyle = 'rgba(224,184,78,0.12)';
  for (let y = 0; y < sh; y += 7) g.fillRect(0, y, sw, 1);
  // rollers
  const roller = g.createLinearGradient(0, 0, 0, 26);
  roller.addColorStop(0, '#241d16');
  roller.addColorStop(0.5, '#4a3b2a');
  roller.addColorStop(1, '#241d16');
  g.save();
  g.fillStyle = roller; g.fillRect(-12, 4, sw + 24, 26);
  g.translate(0, sh - 30);
  g.fillRect(-12, 0, sw + 24, 26);
  g.restore();
  // painting window
  const pw = sw - 120, px0 = 60;
  const ph = sh - 220, py0 = 100;
  g.fillStyle = '#efe8d8';
  g.fillRect(px0 - 8, py0 - 8, pw + 16, ph + 16);
  // fit the play canvas (cover)
  const srcAR = W / H, dstAR = pw / ph;
  let sx = 0, sy = 0, sW2 = W, sH2 = H;
  if (srcAR > dstAR) { sW2 = H * dstAR; sx = (W - sW2) / 2; }
  else { sH2 = W / dstAR; sy = (H - sH2) / 2; }
  g.drawImage(paperC, sx * DPR, sy * DPR, sW2 * DPR, sH2 * DPR, px0, py0, pw, ph);
  g.drawImage(obsC, sx * DPR, sy * DPR, sW2 * DPR, sH2 * DPR, px0, py0, pw, ph);
  g.drawImage(inkC, sx * DPR, sy * DPR, sW2 * DPR, sH2 * DPR, px0, py0, pw, ph);
  // title (vertical) & seal
  g.fillStyle = '#1d1a16';
  g.font = '700 34px "Hiragino Mincho ProN","Yu Mincho",serif';
  g.textAlign = 'center';
  g.fillText('墨', px0 + pw - 30, py0 + 44);
  g.fillText('蛍', px0 + pw - 30, py0 + 82);
  g.save();
  g.translate(px0 + 38, py0 + ph - 64);
  g.rotate(0.04);
  g.fillStyle = '#b3342e';
  g.fillRect(-17, -17, 36, 52);
  g.fillStyle = '#efe8d8';
  g.font = '700 20px "Hiragino Mincho ProN",serif';
  g.fillText('墨', 1, 0);
  g.fillText('蛍', 1, 24);
  g.restore();
  // score line
  g.fillStyle = '#3a332b';
  g.font = '600 22px "Hiragino Mincho ProN",serif';
  g.textAlign = 'center';
  const caption = gameMode === 'meguri'
    ? '第' + nightN + '夜　星 ' + stars + '/' + nightGoal + '　スコア ' + Math.floor(score).toLocaleString()
    : M.name + '　スコア ' + Math.floor(score).toLocaleString() + '　星 ' + stars;
  g.fillText(caption, sw / 2, py0 + ph + 52);
  return c;
}

function composeScroll() {
  scrollC = makeScroll();
  ui.scrollimg.src = scrollC.toDataURL('image/png');
  ui.keep.disabled = false;
  ui.keep.textContent = 'ギャラリーに飾る';
}

function galleryJpeg() {
  const c = document.createElement('canvas');
  c.width = 480; c.height = 720;
  c.getContext('2d').drawImage(scrollC, 0, 0, 480, 720);
  return c.toDataURL('image/jpeg', 0.8);
}

// ============================================================
// Input
// ============================================================
let drawingId = null;
let pressStart = 0, pressX = 0, pressY = 0, pressMoved = false;
let praying = false;

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  initAudio();
  if (state !== 'play') return;
  if (drawingId !== null) return;
  drawingId = e.pointerId;
  armed = true; // the night starts breathing the moment you touch the paper
  pressStart = performance.now();
  pressX = e.clientX; pressY = e.clientY;
  pressMoved = false;
  strokeStart(e.clientX, e.clientY);
});
canvas.addEventListener('pointermove', e => {
  if (state !== 'play' || e.pointerId !== drawingId) return;
  if (Math.hypot(e.clientX - pressX, e.clientY - pressY) > 9) pressMoved = true;
  if (e.getCoalescedEvents) {
    for (const ce of e.getCoalescedEvents()) strokeMove(ce.clientX, ce.clientY, ce.pressure);
  } else {
    strokeMove(e.clientX, e.clientY, e.pressure);
  }
});
function endPointer(e) {
  if (e.pointerId === drawingId) { drawingId = null; strokeEnd(); }
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);

// ============================================================
// Update
// ============================================================
function update(dt) {
  // prayer is a helping hand for the gentle modes only — 夜半/暁 are
  // pure tests of brushwork
  const prayerAllowed = gameMode === 'meguri' || modeKey === 'yoi';
  praying = prayerAllowed && state === 'play' && drawingId !== null && !pressMoved &&
            performance.now() - pressStart > 250 && !!star && ink > inkMax * 0.03;
  if (praying) ink = Math.max(0, ink - inkMax * 0.055 * dt); // prayer burns ink
  if (state === 'play') {
    playT += dt;
    if (armed) countT -= dt; // the night holds its breath until the first stroke
    starPulse += dt * (countT < 3 ? 9 : 4);
    if (nightClearPending > 0) {
      nightClearPending -= dt;
      if (nightClearPending <= 0) { nightClear(); return; }
    }
    ink = Math.min(inkMax, ink + inkRegen * dt);
    if (brushDried && ink > inkMax * 0.12) brushDried = false;

    if (countT < 3.2 && countT > 0) {
      const sec = Math.ceil(countT);
      if (sec !== lastTickSec) { lastTickSec = sec; sfx.tick(); }
    }
    if (countT <= 0) { die(); }
    else updateFly(dt);
  }
  if (state === 'dying') {
    dieT += dt;
    fly.glow = Math.max(0, 1 - dieT / 1.6) * (Math.sin(dieT * 26) * 0.5 + 0.5);
    fly.y += dt * 26;        // drifts down like a falling leaf
    fly.x += Math.sin(dieT * 3.2) * dt * 30;
    if (dieT > 2.0) finishGameOver();
  }

  updateBurns(dt);
  if (state === 'play' || state === 'dying') enforceInkBudget(dt);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += (p.grav || 0) * dt;
    p.vx *= 0.985; p.vy *= 0.985;
  }
  for (let i = popups.length - 1; i >= 0; i--) {
    popups[i].t += dt;
    if (popups[i].t > 1.1) popups.splice(i, 1);
  }
}

// ============================================================
// Render
// ============================================================
function render(now) {
  ctx.drawImage(paperC, 0, 0, W, H);
  ctx.drawImage(obsC, 0, 0, W, H);
  ctx.drawImage(inkC, 0, 0, W, H);

  // fading strokes: warning shimmer, then dissolve
  for (const st of strokes) {
    if (st.state !== 'fading') continue;
    const a = st.fadeT < 0.55
      ? 0.6 + Math.sin(st.fadeT * 22) * 0.35
      : Math.max(0, 1 - (st.fadeT - 0.55) / 0.8) * 0.6;
    if (a <= 0.01) continue;
    ctx.save();
    ctx.globalAlpha = a;
    for (const k of st.segIdxs) {
      const s = segs[k];
      drawBrushSeg(ctx, s, s.dry);
    }
    ctx.restore();
  }

  // star
  if (star && (state === 'play')) {
    const pulse = 1 + Math.sin(starPulse) * 0.1;
    const frac = clamp(countT / countMax, 0, 1);
    const urgent = countT < 3;
    // halo
    const hg = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.r * 4.4);
    hg.addColorStop(0, urgent ? 'rgba(214,120,40,0.34)' : 'rgba(224,184,78,0.3)');
    hg.addColorStop(1, 'rgba(224,184,78,0)');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(star.x, star.y, star.r * 4.4, 0, TAU); ctx.fill();
    // gold-leaf flake
    ctx.save();
    ctx.translate(star.x, star.y);
    ctx.rotate(now * 0.0006);
    ctx.fillStyle = urgent ? '#cf7a2a' : '#d8ae3e';
    ctx.beginPath();
    const rr = star.r * pulse;
    for (let i = 0; i < 5; i++) {
      const a1 = i / 5 * TAU - Math.PI / 2;
      const a2 = a1 + TAU / 10;
      ctx.lineTo(Math.cos(a1) * rr, Math.sin(a1) * rr);
      ctx.lineTo(Math.cos(a2) * rr * 0.5, Math.sin(a2) * rr * 0.5);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,240,190,0.85)';
    ctx.beginPath(); ctx.arc(0, 0, rr * 0.22, 0, TAU); ctx.fill();
    ctx.restore();
    // catch zone: a faint gold pool inside the ring
    ctx.fillStyle = 'rgba(216,174,62,' + (urgent ? 0.1 : 0.07) + ')';
    ctx.beginPath(); ctx.arc(star.x, star.y, star.hitR, 0, TAU); ctx.fill();
    // countdown ring — this circle IS the hitbox
    ctx.strokeStyle = urgent
      ? 'rgba(190,70,40,' + (Math.sin(now * 0.02) > 0 ? 0.95 : 0.45) + ')'
      : 'rgba(160,120,40,0.75)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.hitR, -Math.PI / 2, -Math.PI / 2 + frac * TAU);
    ctx.stroke();
    // the spent part of the ring stays as a ghost so the circle reads as a circle
    ctx.strokeStyle = 'rgba(160,120,40,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.hitR, -Math.PI / 2 + frac * TAU, -Math.PI / 2 + TAU);
    ctx.stroke();
    // seconds
    ctx.fillStyle = urgent ? 'rgba(170,60,30,0.9)' : 'rgba(120,95,40,0.8)';
    ctx.font = '600 ' + Math.max(12, U * 0.022) + 'px "Hiragino Mincho ProN",serif';
    ctx.textAlign = 'center';
    ctx.fillText(Math.ceil(countT), star.x, star.y - star.hitR - 8);
    // first-star label
    if (stars === 0) {
      ctx.fillStyle = 'rgba(120,95,40,0.85)';
      ctx.font = '600 ' + Math.max(14, U * 0.024) + 'px "Hiragino Mincho ProN",serif';
      ctx.fillText('この星へ', star.x, star.y + star.hitR + Math.max(20, U * 0.03));
    }
    // guide chevrons: firefly → star
    const gdx = star.x - fly.x, gdy = star.y - fly.y;
    const gd = Math.hypot(gdx, gdy);
    if (gd > U * 0.22) {
      const nx = gdx / gd, ny = gdy / gd;
      const px2 = -ny, py2 = nx;
      const flow = (now * 0.0028) % 1;
      for (let i = 0; i < 3; i++) {
        const t = fly.r * 3.4 + i * 16 + flow * 16;
        const cxp = fly.x + nx * t, cyp = fly.y + ny * t;
        const a = (0.55 - i * 0.14) * fly.glow * (tut < 2 ? 1 : 0.55);
        ctx.strokeStyle = 'rgba(200,155,60,' + a.toFixed(3) + ')';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(cxp - nx * 8 + px2 * 6.5, cyp - ny * 8 + py2 * 6.5);
        ctx.lineTo(cxp, cyp);
        ctx.lineTo(cxp - nx * 8 - px2 * 6.5, cyp - ny * 8 - py2 * 6.5);
        ctx.stroke();
      }
    }
  }

  // title demo star
  if (state === 'title' && titleStar) {
    const hg2 = ctx.createRadialGradient(titleStar.x, titleStar.y, 0, titleStar.x, titleStar.y, titleStar.r * 4);
    hg2.addColorStop(0, 'rgba(224,184,78,0.3)');
    hg2.addColorStop(1, 'rgba(224,184,78,0)');
    ctx.fillStyle = hg2;
    ctx.beginPath(); ctx.arc(titleStar.x, titleStar.y, titleStar.r * 4, 0, TAU); ctx.fill();
    ctx.save();
    ctx.translate(titleStar.x, titleStar.y);
    ctx.rotate(now * 0.0006);
    ctx.fillStyle = '#d8ae3e';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = i / 5 * TAU - Math.PI / 2, a2 = a1 + TAU / 10;
      ctx.lineTo(Math.cos(a1) * titleStar.r, Math.sin(a1) * titleStar.r);
      ctx.lineTo(Math.cos(a2) * titleStar.r * 0.5, Math.sin(a2) * titleStar.r * 0.5);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // bells on the terrain
  for (const b of bells) {
    const a2 = b.used ? 0.25 : 0.85;
    if (!b.used) {
      const bg2 = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 3);
      bg2.addColorStop(0, 'rgba(224,184,78,0.22)');
      bg2.addColorStop(1, 'rgba(224,184,78,0)');
      ctx.fillStyle = bg2;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 3, 0, TAU); ctx.fill();
    }
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(Math.sin(now * 0.003 + b.x) * 0.12);
    ctx.fillStyle = b.used ? 'rgba(140,125,90,0.4)' : '#cda53a';
    ctx.beginPath();
    ctx.arc(0, -b.r * 0.1, b.r, Math.PI * 1.1, Math.PI * 1.9);
    ctx.lineTo(b.r * 0.95, b.r * 0.55);
    ctx.lineTo(-b.r * 0.95, b.r * 0.55);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = b.used ? 'rgba(120,105,75,0.4)' : '#9a7b22';
    ctx.beginPath(); ctx.arc(0, b.r * 0.75, b.r * 0.22, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // prayer: a golden thread binds the firefly to the star
  if (praying && star && state === 'play') {
    const dx = star.x - fly.x, dy = star.y - fly.y;
    const d = Math.hypot(dx, dy) || 1;
    ctx.save();
    ctx.strokeStyle = 'rgba(216,174,62,' + (0.3 + Math.sin(now * 0.012) * 0.12) + ')';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 9]);
    ctx.lineDashOffset = -now * 0.04;
    ctx.beginPath();
    ctx.moveTo(fly.x + dx / d * fly.r * 2, fly.y + dy / d * fly.r * 2);
    ctx.lineTo(star.x - dx / d * star.hitR, star.y - dy / d * star.hitR);
    ctx.stroke();
    ctx.restore();
  }

  // firefly trail
  for (let i = trail.length - 1; i >= 1; i--) {
    const t = trail[i];
    const a = (1 - i / trail.length);
    ctx.fillStyle = 'rgba(255,196,70,' + (a * 0.22 * fly.glow) + ')';
    ctx.beginPath();
    ctx.arc(t.x, t.y, fly.r * (0.25 + a * 0.8), 0, TAU);
    ctx.fill();
  }

  // firefly
  if (state === 'play' || state === 'dying' || state === 'title') {
    const wx = fly.x + Math.cos(fly.wob) * 1.6;
    const wy = fly.y + Math.sin(fly.wob * 1.3) * 1.6;
    const glow = fly.glow;
    if (glow > 0.02) {
      const fg = ctx.createRadialGradient(wx, wy, 0, wx, wy, fly.r * 5);
      fg.addColorStop(0, 'rgba(255,214,90,' + 0.5 * glow + ')');
      fg.addColorStop(0.4, 'rgba(255,180,60,' + 0.16 * glow + ')');
      fg.addColorStop(1, 'rgba(255,180,60,0)');
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.arc(wx, wy, fly.r * 5, 0, TAU); ctx.fill();
    }
    ctx.fillStyle = glow > 0.05 ? '#ffe9a8' : '#6b6358';
    ctx.beginPath(); ctx.arc(wx, wy, fly.r * 0.62, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(60,48,30,' + (0.55 + glow * 0.2) + ')';
    ctx.beginPath(); ctx.ellipse(wx, wy - fly.r * 0.42, fly.r * 0.4, fly.r * 0.26, 0, 0, TAU); ctx.fill();
  }

  // particles
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.fillStyle = 'rgba(' + p.col + ',' + a.toFixed(3) + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (0.4 + a * 0.6), 0, TAU);
    ctx.fill();
  }

  // popups
  ctx.textAlign = 'center';
  ctx.font = '600 ' + Math.max(15, U * 0.026) + 'px "Hiragino Mincho ProN",serif';
  for (const p of popups) {
    ctx.fillStyle = 'rgba(154,123,34,' + (1 - p.t / 1.1).toFixed(3) + ')';
    ctx.fillText(p.txt, p.x, p.y - p.t * 34);
  }

  // ink meter — a brush line in the corner
  if (state === 'play') {
    const mw = Math.min(190, W * 0.3), mx = 22, my = H - 26;
    ctx.font = '600 15px "Hiragino Mincho ProN",serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = brushDried ? 'rgba(179,52,46,0.85)' : 'rgba(43,38,32,0.7)';
    ctx.fillText('墨', mx, my + 5);
    ctx.strokeStyle = 'rgba(43,38,32,0.18)';
    ctx.lineCap = 'round';
    ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(mx + 24, my); ctx.lineTo(mx + 24 + mw, my); ctx.stroke();
    const f = ink / inkMax;
    if (f > 0.01) {
      ctx.strokeStyle = brushDried ? 'rgba(179,52,46,0.8)' : 'rgba(30,26,22,0.85)';
      ctx.lineWidth = 7;
      ctx.beginPath(); ctx.moveTo(mx + 24, my); ctx.lineTo(mx + 24 + mw * f, my); ctx.stroke();
      // brush tip taper
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(mx + 24 + mw * f, my); ctx.lineTo(mx + 24 + Math.min(mw, mw * f + 9), my); ctx.stroke();
    }
  }

  // dying veil — warm dusk falling over the paper
  if (state === 'dying') {
    ctx.fillStyle = 'rgba(62,44,24,' + (Math.min(0.42, dieT * 0.26)) + ')';
    ctx.fillRect(0, 0, W, H);
  }
}

// HUD
let lastHud = 0;
function updateHud(now) {
  if (now - lastHud < 80) return;
  lastHud = now;
  ui.score.textContent = Math.floor(score).toLocaleString();
  ui.sub.innerHTML = gameMode === 'meguri'
    ? M.name + '　星 ' + stars + '/' + nightGoal +

    : M.name + '　星 ' + stars +

      '　<span style="opacity:0.6">最高 ' + best.toLocaleString() + '</span>';
}

// ============================================================
// Title ambience: decorative strokes + wandering firefly
// ============================================================
function decorateTitle() {
  // organic curved strokes, sampled from quadratic beziers
  const curves = [
    [[0.06, 0.85], [0.22, 0.55], [0.38, 0.4]],
    [[0.66, 0.12], [0.8, 0.3], [0.94, 0.3]],
    [[0.58, 0.9], [0.74, 0.74], [0.92, 0.82]],
  ];
  for (const [p0, p1, p2] of curves) {
    const N = 14;
    let prev = null;
    const obj = { segIdxs: [], dots: [], len: 0, state: 'live', fadeT: 0 };
    strokes.push(obj);
    for (let i = 0; i <= N; i++) {
      const t = i / N;
      const x = (1 - t) * (1 - t) * p0[0] + 2 * (1 - t) * t * p1[0] + t * t * p2[0];
      const y = (1 - t) * (1 - t) * p0[1] + 2 * (1 - t) * t * p1[1] + t * t * p2[1];
      const pt = { x: x * W, y: y * H };
      if (prev) {
        const taper = Math.sin(t * Math.PI);   // thick middle, tapered ends
        const dry = t > 0.78;
        const s = { ax: prev.x, ay: prev.y, bx: pt.x, by: pt.y, r: 2 + taper * 5.5, dead: false, dry, stroke: obj };
        segs.push(s);
        obj.segIdxs.push(segs.length - 1);
        obj.len += Math.hypot(pt.x - prev.x, pt.y - prev.y);
        drawBrushSeg(inkX, s, dry);
      }
      prev = pt;
    }
  }
  rebuildGrid();
  fly.x = W * 0.5; fly.y = H * 0.3;
  fly.vx = 0.8; fly.vy = 0.6;
  inkParams();
  titleStar = { x: W * 0.22, y: H * 0.72, r: Math.max(10, U * 0.018) };
}

// ============================================================
// Main loop
// ============================================================
layout();
decorateTitle();

let lastT = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.08) dt = 0.08;
  if (state === 'title') {
    // ambient flight, no rules
    updateFlyAmbient(dt);
    updateBurns(dt);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
      else { p.x += p.vx * dt; p.y += p.vy * dt; }
    }
  } else {
    update(dt);
  }
  render(now);
  updateHud(now);
}

function updateFlyAmbient(dt) {
  const sp = U * 0.18;
  if (titleStar) { // the demo firefly seeks the demo star too
    const want = Math.atan2(titleStar.y - fly.y, titleStar.x - fly.x);
    const cur = Math.atan2(fly.vy, fly.vx);
    let dAng = want - cur;
    while (dAng > Math.PI) dAng -= TAU;
    while (dAng < -Math.PI) dAng += TAU;
    const na = cur + clamp(dAng, -0.6 * dt, 0.6 * dt);
    fly.vx = Math.cos(na); fly.vy = Math.sin(na);
  }
  fly.x += fly.vx * sp * dt;
  fly.y += fly.vy * sp * dt;
  const m = 30;
  if (fly.x < m || fly.x > W - m) fly.vx *= -1;
  if (fly.y < m || fly.y > H - m) fly.vy *= -1;
  const near = nearbySegs(fly.x, fly.y, fly.r + 12);
  for (const sg of near) {
    const c = segClosest(sg, fly.x, fly.y);
    const d = Math.hypot(c.x - fly.x, c.y - fly.y) || 0.001;
    const R = sg.r + fly.r;
    if (d < R) {
      const nx = (fly.x - c.x) / d, ny = (fly.y - c.y) / d;
      fly.x = c.x + nx * (R + 0.5); fly.y = c.y + ny * (R + 0.5);
      const dot = fly.vx * nx + fly.vy * ny;
      if (dot < 0) { fly.vx -= 2 * dot * nx; fly.vy -= 2 * dot * ny; }
    }
  }
  fly.wob += dt * 7;
  trail.unshift({ x: fly.x, y: fly.y });
  if (trail.length > 26) trail.pop();
  fly.glow = 1;
  // wordless demo: the firefly collects the title star
  if (titleStar && Math.hypot(fly.x - titleStar.x, fly.y - titleStar.y) < fly.r + titleStar.r) {
    for (let i = 0; i < 26; i++) {
      const a = rand(TAU), sp2 = rand(30, U * 0.3);
      particles.push({ x: titleStar.x, y: titleStar.y, vx: Math.cos(a) * sp2, vy: Math.sin(a) * sp2 - 20, life: rand(0.4, 1), maxLife: 1, size: rand(1.5, 3.5), col: '224,184,78', grav: 50 });
    }
    sfx.star();
    const spots = [[0.22, 0.72], [0.8, 0.18], [0.16, 0.22], [0.84, 0.78], [0.5, 0.85]];
    const s2 = spots[Math.floor(rand(spots.length))];
    titleStar.x = s2[0] * W; titleStar.y = s2[1] * H;
  }
}

document.addEventListener('visibilitychange', () => {});
requestAnimationFrame(frame);

})();
</script>
