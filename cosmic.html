<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>COSMIC FUSION — DevNull Studio</title>
<meta name="description" content="COSMIC FUSION — 星を落として合体させ、太陽を目指す宇宙パズル。DevNull Studio製。">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a0a14;
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', -apple-system, sans-serif;
  color: #e8ecff;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

#game { position: fixed; inset: 0; display: block; }

/* ---- HUD ---- */
#hud {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 4;
  opacity: 0;
  transition: opacity 0.4s;
}
#hud.on { opacity: 1; }

.hud-score {
  position: absolute; top: max(14px, env(safe-area-inset-top)); left: 20px;
  font-size: clamp(22px, 3.6vw, 38px);
  font-weight: 800;
  color: #fff;
  text-shadow: 0 0 14px rgba(140,160,255,0.8);
  letter-spacing: 0.03em;
}
.hud-best {
  position: absolute; top: calc(max(14px, env(safe-area-inset-top)) + clamp(30px, 4.6vw, 48px)); left: 20px;
  font-size: 12px;
  color: rgba(232,236,255,0.55);
  letter-spacing: 0.14em;
}
#combo {
  position: absolute; top: 24%; left: 0; right: 0;
  text-align: center;
  font-size: clamp(22px, 4.5vw, 44px);
  font-weight: 800;
  color: #ffd24d;
  text-shadow: 0 0 18px rgba(255,210,77,0.9);
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 0.15s, transform 0.15s;
}
#combo.show { opacity: 1; transform: scale(1); }

/* ---- Overlays ---- */
#overlay {
  position: fixed; inset: 0;
  z-index: 6;
  display: flex;
  align-items: center; justify-content: center;
  text-align: center;
  background: rgba(10,10,20,0.72);
  transition: opacity 0.35s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }

.logo {
  font-size: clamp(36px, 8vw, 78px);
  font-weight: 800;
  letter-spacing: 0.06em;
  line-height: 1.1;
  background: linear-gradient(180deg, #fff 20%, #8ab4ff 60%, #c08aff 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 22px rgba(140,160,255,0.55));
}
.logo-sub {
  margin-top: 12px;
  font-size: clamp(11px, 1.8vw, 15px);
  letter-spacing: 0.42em;
  color: rgba(170,190,255,0.8);
}
.howto {
  margin: 26px auto 0;
  max-width: 480px;
  font-size: clamp(12px, 1.9vw, 15px);
  line-height: 2.1;
  color: rgba(232,236,255,0.82);
  padding: 0 22px;
}
.howto b { color: #ffd24d; font-weight: 800; }
.start-hint {
  margin-top: 28px;
  font-size: clamp(14px, 2.2vw, 18px);
  letter-spacing: 0.2em;
  color: #cfe0ff;
  animation: blink 1.2s infinite;
}
@keyframes blink { 50% { opacity: 0.25; } }
.keys {
  margin-top: 16px;
  font-size: 10px; letter-spacing: 0.2em;
  color: rgba(232,236,255,0.35);
}

.go-title {
  font-size: clamp(30px, 6.5vw, 64px);
  font-weight: 800;
  letter-spacing: 0.1em;
  color: #ff8aa8;
  text-shadow: 0 0 26px rgba(255,100,140,0.6);
}
.go-stats {
  margin-top: 24px;
  font-size: clamp(14px, 2.3vw, 19px);
  line-height: 2.2;
  letter-spacing: 0.08em;
  color: rgba(232,236,255,0.92);
}
.go-stats .v { color: #ffd24d; font-weight: 800; }
.go-stats .new {
  color: #0a0a14; background: #ffd24d;
  border-radius: 4px;
  padding: 1px 8px; margin-left: 8px;
  animation: blink 0.8s infinite;
}

.foot-credit {
  position: fixed; bottom: max(10px, env(safe-area-inset-bottom)); left: 0; right: 0;
  text-align: center;
  font-size: 10px; letter-spacing: 0.22em;
  color: rgba(232,236,255,0.28);
  z-index: 6;
}
.foot-credit a { color: rgba(140,180,255,0.5); text-decoration: none; }
#hud.on ~ .foot-credit { opacity: 0; transition: opacity 0.4s; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div class="hud-score" id="score">0</div>
  <div class="hud-best" id="best">BEST 0</div>
  <div id="combo"></div>
</div>

<div id="overlay">
  <div id="screen-title">
    <div class="logo">COSMIC<br>FUSION</div>
    <div class="logo-sub">MERGE THE PLANETS</div>
    <div class="howto">
      <b>ドラッグ</b>で狙いを定めて、<b>指を離すと</b>星が落ちる。<br>
      同じ星どうしがぶつかると<b>合体して進化</b>。<br>
      隕石 → 月 → … → 木星 → <b>太陽</b>を目指そう。<br>
      上のラインから星があふれたらゲームオーバー。
    </div>
    <div class="start-hint">▶ タップしてスタート</div>
    <div class="keys">[M] MUTE&nbsp;&nbsp;[R] RESTART</div>
  </div>
  <div id="screen-over" style="display:none">
    <div class="go-title">SUPERNOVA...</div>
    <div class="go-stats" id="go-stats"></div>
    <div class="start-hint">▶ タップでもう一度</div>
  </div>
</div>

<div class="foot-credit">COSMIC FUSION — <a href="/">DEVNULL STUDIO</a></div>

<script>
'use strict';
(() => {

// ============================================================
// Setup
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
const IS_TOUCH = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

const $ = id => document.getElementById(id);
const ui = {
  hud: $('hud'), score: $('score'), best: $('best'), combo: $('combo'),
  overlay: $('overlay'), title: $('screen-title'), over: $('screen-over'),
  goStats: $('go-stats'),
};

const rand = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;

// ============================================================
// Planets
// ============================================================
const LV = [
  { name: 'いんせき', en: 'METEOR',  r: 1.05, c1: '#aab6c8', c2: '#5a6678', glow: '#8fa3c0', type: 'crater' },
  { name: 'つき',     en: 'MOON',    r: 1.38, c1: '#efe9d4', c2: '#b0a890', glow: '#fff7d9', type: 'crater' },
  { name: 'すいせい', en: 'MERCURY', r: 1.78, c1: '#d4a87e', c2: '#8a6648', glow: '#ffd9ae', type: 'plain'  },
  { name: 'かせい',   en: 'MARS',    r: 2.24, c1: '#ec8058', c2: '#9c3f24', glow: '#ff9a70', type: 'cap'    },
  { name: 'きんせい', en: 'VENUS',   r: 2.74, c1: '#f4d595', c2: '#bd8e4a', glow: '#ffe9b0', type: 'band'   },
  { name: 'ちきゅう', en: 'EARTH',   r: 3.32, c1: '#56acff', c2: '#1d5fa8', glow: '#7cc4ff', type: 'earth'  },
  { name: 'かいおうせい', en: 'NEPTUNE', r: 4.0,  c1: '#5e78ff', c2: '#2b3a9e', glow: '#7d90ff', type: 'band' },
  { name: 'てんのうせい', en: 'URANUS',  r: 4.8,  c1: '#8deeee', c2: '#3aa8b8', glow: '#a8f4f4', type: 'band' },
  { name: 'どせい',   en: 'SATURN',  r: 5.7,  c1: '#eed09a', c2: '#a8854e', glow: '#ffe1a8', type: 'ring'   },
  { name: 'もくせい', en: 'JUPITER', r: 6.7,  c1: '#eeb27a', c2: '#9e6034', glow: '#ffc890', type: 'stripe' },
  { name: 'たいよう', en: 'SUN',     r: 7.8,  c1: '#fff7c0', c2: '#ff9d2e', glow: '#ffd24d', type: 'sun'    },
];
const MAXLV = LV.length - 1;
const DROP_POOL = [0, 0, 0, 1, 1, 2, 2, 3, 4];
const pts = lvl => lvl * (lvl + 1) / 2 * 2; // resulting level → points

// ============================================================
// Board geometry (recomputed on resize)
// ============================================================
let bx = 0, by = 0, bw = 0, bh = 0, u = 1, dropY = 0, G = 0;

function layout() {
  DPR = Math.min(window.devicePixelRatio || 1, IS_TOUCH ? 1.5 : 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  const topPad = Math.max(70, H * 0.1);   // HUD + dropper space
  const botPad = Math.max(58, H * 0.075); // evolution chart
  const availH = H - topPad - botPad - 30;
  bw = Math.min(W * 0.94, 640, availH / 1.18);
  bh = bw * 1.18;
  bx = (W - bw) / 2;
  by = H - botPad - bh - 8;
  u = bw / 20;
  dropY = by - u * 1.6;
  G = bw * 5.2;
  spriteCache.clear();
  makeStars();
}

let stars = [];
function makeStars() {
  stars = [];
  for (let i = 0; i < 60; i++) stars.push({ x: rand(W), y: rand(H), z: rand(0.3, 1), tw: rand(TAU) });
}

// ============================================================
// Planet sprites (pre-rendered, cute faces included)
// ============================================================
const spriteCache = new Map();
function planetSprite(lvl, pr) {
  const key = lvl + '|' + Math.round(pr);
  let c = spriteCache.get(key);
  if (c) return c;
  const L = LV[lvl];
  const ringW = L.type === 'ring' ? pr * 0.85 : 0;
  const pad = pr * 1.35 + ringW;
  c = document.createElement('canvas');
  c.width = c.height = Math.ceil(pad * 2 * DPR);
  const g = c.getContext('2d');
  g.scale(DPR, DPR);
  g.translate(pad, pad);

  // glow halo
  const halo = g.createRadialGradient(0, 0, pr * 0.7, 0, 0, pr * 1.3);
  halo.addColorStop(0, L.glow + '55');
  halo.addColorStop(1, L.glow + '00');
  g.fillStyle = halo;
  g.beginPath(); g.arc(0, 0, pr * 1.3, 0, TAU); g.fill();

  // ring (back half)
  if (L.type === 'ring') {
    g.save();
    g.rotate(-0.3);
    g.strokeStyle = 'rgba(238,208,154,0.85)';
    g.lineWidth = pr * 0.22;
    g.beginPath(); g.ellipse(0, 0, pr * 1.55, pr * 0.48, 0, Math.PI, TAU); g.stroke();
    g.restore();
  }

  // sphere
  const sg = g.createRadialGradient(-pr * 0.35, -pr * 0.4, pr * 0.1, 0, 0, pr);
  sg.addColorStop(0, L.c1);
  sg.addColorStop(1, L.c2);
  g.fillStyle = sg;
  g.beginPath(); g.arc(0, 0, pr, 0, TAU); g.fill();

  // features (clipped to sphere)
  g.save();
  g.beginPath(); g.arc(0, 0, pr, 0, TAU); g.clip();
  if (L.type === 'crater') {
    g.fillStyle = 'rgba(0,0,0,0.14)';
    [[-0.35, 0.3, 0.2], [0.4, -0.35, 0.16], [0.15, 0.55, 0.12], [-0.55, -0.25, 0.1]].forEach(([cx, cy, cr]) => {
      g.beginPath(); g.arc(cx * pr, cy * pr, cr * pr, 0, TAU); g.fill();
    });
  } else if (L.type === 'cap') {
    g.fillStyle = 'rgba(255,255,255,0.5)';
    g.beginPath(); g.ellipse(0, -pr * 0.85, pr * 0.5, pr * 0.22, 0, 0, TAU); g.fill();
    g.fillStyle = 'rgba(0,0,0,0.12)';
    g.beginPath(); g.ellipse(-pr * 0.3, pr * 0.35, pr * 0.4, pr * 0.18, 0.4, 0, TAU); g.fill();
  } else if (L.type === 'band') {
    g.fillStyle = 'rgba(255,255,255,0.16)';
    g.fillRect(-pr, -pr * 0.45, pr * 2, pr * 0.22);
    g.fillStyle = 'rgba(0,0,0,0.1)';
    g.fillRect(-pr, pr * 0.25, pr * 2, pr * 0.28);
  } else if (L.type === 'earth') {
    g.fillStyle = 'rgba(90,200,120,0.85)';
    [[-0.4, -0.25, 0.38], [0.35, 0.2, 0.3], [0.0, 0.62, 0.22]].forEach(([cx, cy, cr]) => {
      g.beginPath(); g.arc(cx * pr, cy * pr, cr * pr, 0, TAU); g.fill();
    });
    g.fillStyle = 'rgba(255,255,255,0.35)';
    g.beginPath(); g.ellipse(pr * 0.2, -pr * 0.55, pr * 0.45, pr * 0.12, -0.3, 0, TAU); g.fill();
  } else if (L.type === 'stripe') {
    for (let i = -3; i <= 3; i++) {
      g.fillStyle = i % 2 ? 'rgba(120,60,20,0.18)' : 'rgba(255,235,200,0.14)';
      g.fillRect(-pr, i * pr * 0.28 - pr * 0.1, pr * 2, pr * 0.2);
    }
    g.fillStyle = 'rgba(200,70,40,0.5)';
    g.beginPath(); g.ellipse(pr * 0.35, pr * 0.3, pr * 0.24, pr * 0.14, 0, 0, TAU); g.fill();
  } else if (L.type === 'sun') {
    const fg = g.createRadialGradient(0, 0, 0, 0, 0, pr);
    fg.addColorStop(0, '#fffbe0');
    fg.addColorStop(0.6, '#ffd24d');
    fg.addColorStop(1, '#ff8a1e');
    g.fillStyle = fg;
    g.beginPath(); g.arc(0, 0, pr, 0, TAU); g.fill();
  }
  g.restore();

  // ring (front half)
  if (L.type === 'ring') {
    g.save();
    g.rotate(-0.3);
    g.strokeStyle = 'rgba(250,228,180,0.95)';
    g.lineWidth = pr * 0.22;
    g.beginPath(); g.ellipse(0, 0, pr * 1.55, pr * 0.48, 0, 0, Math.PI); g.stroke();
    g.restore();
  }

  // cute face
  const ey = -pr * 0.08, ex = pr * 0.32, er = Math.max(1.5, pr * 0.09);
  g.fillStyle = '#222632';
  g.beginPath(); g.arc(-ex, ey, er, 0, TAU); g.fill();
  g.beginPath(); g.arc(ex, ey, er, 0, TAU); g.fill();
  g.fillStyle = '#fff';
  g.beginPath(); g.arc(-ex + er * 0.3, ey - er * 0.3, er * 0.35, 0, TAU); g.fill();
  g.beginPath(); g.arc(ex + er * 0.3, ey - er * 0.3, er * 0.35, 0, TAU); g.fill();
  g.strokeStyle = '#222632';
  g.lineWidth = Math.max(1.2, pr * 0.05);
  g.lineCap = 'round';
  g.beginPath(); g.arc(0, pr * 0.12, pr * 0.2, 0.25, Math.PI - 0.25); g.stroke();

  spriteCache.set(key, c);
  return c;
}

function drawPlanet(lvl, x, y, pr, rot) {
  const spr = planetSprite(lvl, pr);
  const half = spr.width / DPR / 2;
  if (rot) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
    ctx.drawImage(spr, -half, -half, half * 2, half * 2);
    ctx.restore();
  } else {
    ctx.drawImage(spr, x - half, y - half, half * 2, half * 2);
  }
}

// ============================================================
// Game state
// ============================================================
let state = 'title'; // title | play | over
let balls = [];
let particles = [];
let popups = [];
let score = 0;
let best = +(localStorage.getItem('cosmicfusion_best') || 0);
let maxLvl = 0;
let chain = 0, lastMergeT = -10, comboHideT = 0;
let nowT = 0;
let canDropT = 0;
let curLvl = 0, nextLvl = 1;
let aimX = 0;
let danger = 0;
let shake = 0;
let muted = false;
let overAt = 0;
let idSeq = 0;

const REST = 0.12;

function newBall(lvl, x, y, vx = 0, vy = 0) {
  const r = LV[lvl].r * u;
  return { id: idSeq++, lvl, x, y, vx, vy, r, m: r * r, age: 0, overT: 0, rot: rand(-0.3, 0.3), pop: 1 };
}

function pickDrop() { return DROP_POOL[Math.floor(rand(DROP_POOL.length))]; }

// ============================================================
// Audio
// ============================================================
let AC = null, masterGain = null;
function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  masterGain = AC.createGain();
  masterGain.gain.value = 0.5;
  masterGain.connect(AC.destination);
  padLoop();
}
function tone(t, type, f0, f1, peak, dec) {
  if (!AC || muted) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dec);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(peak, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dec);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + dec + 0.1);
}
function padLoop() {
  if (!AC) return;
  if (!muted && state !== 'over') {
    const t = AC.currentTime;
    const chord = [[220, 277, 330], [196, 247, 294]][Math.floor(nowT / 8) % 2];
    chord.forEach(f => tone(t, 'sine', f / 2, f / 2, 0.022, 7));
  }
  setTimeout(padLoop, 8000);
}
const sfx = {
  drop() { tone(AC ? AC.currentTime : 0, 'sine', 320, 220, 0.08, 0.09); },
  merge(lvl) {
    if (!AC || muted) return;
    const t = AC.currentTime;
    const f = 660 - lvl * 42;
    tone(t, 'sine', f, f * 1.4, 0.22, 0.18 + lvl * 0.03);
    tone(t, 'triangle', f * 2, f * 2.5, 0.1, 0.14);
    if (lvl >= 7) { tone(t + 0.1, 'sine', f * 2, f * 2, 0.12, 0.3); tone(t + 0.22, 'sine', f * 2.5, f * 2.5, 0.12, 0.4); }
  },
  nova() {
    if (!AC || muted) return;
    const t = AC.currentTime;
    tone(t, 'sawtooth', 80, 30, 0.3, 0.8);
    tone(t, 'sine', 440, 1760, 0.18, 0.7);
    tone(t + 0.3, 'sine', 880, 880, 0.14, 0.5);
  },
  over() {
    if (!AC || muted) return;
    const t = AC.currentTime;
    [392, 330, 262].forEach((f, i) => tone(t + i * 0.22, 'triangle', f, f, 0.16, 0.3));
  },
};

// ============================================================
// Input — drag anywhere to aim, release to drop
// ============================================================
let aiming = false;

function clampAim() {
  const r = LV[curLvl].r * u;
  aimX = clamp(aimX, bx + r + 2, bx + bw - r - 2);
}
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  initAudio();
  if (state !== 'play') return;
  aiming = true;
  aimX = e.clientX;
  clampAim();
});
canvas.addEventListener('pointermove', e => {
  if (state !== 'play') return;
  if (aiming || e.pointerType === 'mouse') {
    aimX = e.clientX;
    clampAim();
  }
});
function release(e) {
  if (state !== 'play' || !aiming) return;
  aiming = false;
  if (canDropT <= 0) drop();
}
canvas.addEventListener('pointerup', release);
canvas.addEventListener('pointercancel', () => { aiming = false; });

ui.overlay.addEventListener('pointerdown', e => {
  e.preventDefault();
  initAudio();
  if (state === 'title' || (state === 'over' && performance.now() - overAt > 700)) startGame();
});
window.addEventListener('keydown', e => {
  if (e.key === 'm' || e.key === 'M') muted = !muted;
  if (e.key === 'r' || e.key === 'R') { initAudio(); startGame(); }
  if (e.code === 'Enter' && state !== 'play') { initAudio(); startGame(); }
});
document.addEventListener('gesturestart', e => e.preventDefault());

function drop() {
  balls.push(newBall(curLvl, aimX, dropY, 0, u * 2));
  canDropT = 0.5;
  curLvl = nextLvl;
  nextLvl = pickDrop();
  clampAim();
  sfx.drop();
}

// ============================================================
// Physics
// ============================================================
function physics(dt) {
  const sub = 5, h = dt / sub;
  for (let s = 0; s < sub; s++) {
    for (const b of balls) {
      b.vy += G * h;
      b.x += b.vx * h;
      b.y += b.vy * h;
      b.age += h;
      if (b.pop < 1) b.pop = Math.min(1, b.pop + h * 6);
    }
    // walls & floor
    for (const b of balls) {
      if (b.x - b.r < bx) { b.x = bx + b.r; if (b.vx < 0) b.vx *= -REST; }
      if (b.x + b.r > bx + bw) { b.x = bx + bw - b.r; if (b.vx > 0) b.vx *= -REST; }
      if (b.y + b.r > by + bh) {
        b.y = by + bh - b.r;
        if (b.vy > 0) b.vy *= -REST;
        b.vx *= 0.96;
      }
    }
    // pairs
    const merges = [];
    const used = new Set();
    for (let i = 0; i < balls.length; i++) {
      const a = balls[i];
      for (let j = i + 1; j < balls.length; j++) {
        const c = balls[j];
        const dx = c.x - a.x, dy = c.y - a.y;
        const rs = a.r + c.r;
        const d2 = dx * dx + dy * dy;
        if (d2 >= rs * rs) continue;
        if (a.lvl === c.lvl && !used.has(a.id) && !used.has(c.id)) {
          used.add(a.id); used.add(c.id);
          merges.push([a, c]);
          continue;
        }
        const d = Math.sqrt(d2) || 0.001;
        const nx = dx / d, ny = dy / d;
        const overlap = rs - d;
        const tm = a.m + c.m;
        a.x -= nx * overlap * (c.m / tm);
        a.y -= ny * overlap * (c.m / tm);
        c.x += nx * overlap * (a.m / tm);
        c.y += ny * overlap * (a.m / tm);
        const rvn = (c.vx - a.vx) * nx + (c.vy - a.vy) * ny;
        if (rvn < 0) {
          const imp = -(1 + REST) * rvn / (1 / a.m + 1 / c.m);
          a.vx -= imp / a.m * nx; a.vy -= imp / a.m * ny;
          c.vx += imp / c.m * nx; c.vy += imp / c.m * ny;
        }
      }
    }
    for (const [a, c] of merges) doMerge(a, c);
  }
}

function doMerge(a, c) {
  balls = balls.filter(b => b !== a && b !== c);
  const tm = a.m + c.m;
  const x = (a.x * a.m + c.x * c.m) / tm;
  const y = (a.y * a.m + c.y * c.m) / tm;

  chain = (nowT - lastMergeT < 1.3) ? chain + 1 : 1;
  lastMergeT = nowT;

  if (a.lvl >= MAXLV) { // sun + sun = supernova
    supernova(x, y);
    return;
  }
  const lvl = a.lvl + 1;
  const nb = newBall(lvl, x, y, (a.vx + c.vx) * 0.3, Math.min((a.vy + c.vy) * 0.3, 0));
  nb.pop = 0.55;
  balls.push(nb);
  maxLvl = Math.max(maxLvl, lvl);

  const gain = pts(lvl) * chain;
  score += gain;
  popup(x, y - nb.r, '+' + gain, LV[lvl].glow);
  if (chain >= 2) showCombo('CHAIN ×' + chain);
  burst(x, y, 10 + lvl * 3, LV[lvl].glow, u * 14, u * 0.45);
  ring(x, y, LV[lvl].glow, nb.r);
  shake = Math.max(shake, Math.min(2 + lvl * 0.8, 9));
  sfx.merge(lvl);
  if (lvl === MAXLV) { showCombo('☀ たいよう誕生!!'); burst(x, y, 70, '#ffd24d', u * 26, u * 0.6); }
}

function supernova(x, y) {
  score += 1000 * chain;
  popup(x, y, '+'+(1000 * chain), '#ffd24d');
  showCombo('SUPERNOVA!!');
  burst(x, y, 110, '#ffd24d', u * 34, u * 0.7);
  burst(x, y, 60, '#fff', u * 26, u * 0.5);
  ring(x, y, '#fff', u * 4);
  shake = 16;
  for (const b of balls) { // blast pushes everyone
    const dx = b.x - x, dy = b.y - y;
    const d = Math.hypot(dx, dy) || 1;
    const f = u * 110 / (1 + d / u * 0.25);
    b.vx += dx / d * f;
    b.vy += dy / d * f - u * 18;
  }
  sfx.nova();
}

// ============================================================
// FX
// ============================================================
function burst(x, y, n, col, sp, size) {
  for (let i = 0; i < n; i++) {
    const a = rand(TAU), s = rand(0.25, 1) * sp;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - sp * 0.2, life: rand(0.3, 0.9), maxLife: 0.9, size: rand(0.3, 1) * size, col, ring: 0 });
  }
}
function ring(x, y, col, r0) {
  particles.push({ x, y, vx: 0, vy: 0, life: 0.45, maxLife: 0.45, size: r0, col, ring: 1 });
}
function popup(x, y, txt, col) {
  popups.push({ x, y, txt, t: 0, col });
  if (popups.length > 10) popups.shift();
}
let comboT = null;
function showCombo(txt) {
  ui.combo.textContent = txt;
  ui.combo.classList.add('show');
  clearTimeout(comboT);
  comboT = setTimeout(() => ui.combo.classList.remove('show'), 900);
}

// ============================================================
// Flow
// ============================================================
function startGame() {
  state = 'play';
  balls = []; particles = []; popups = [];
  score = 0; maxLvl = 0; chain = 0; lastMergeT = -10;
  canDropT = 0; danger = 0; shake = 0;
  curLvl = pickDrop(); nextLvl = pickDrop();
  aimX = W / 2;
  clampAim();
  ui.overlay.classList.add('hidden');
  ui.hud.classList.add('on');
}

function gameOver() {
  state = 'over';
  overAt = performance.now();
  const s = Math.floor(score);
  const newBest = s > best;
  if (newBest) { best = s; localStorage.setItem('cosmicfusion_best', s); }
  ui.goStats.innerHTML =
    'SCORE <span class="v">' + s.toLocaleString() + '</span>' +
    (newBest ? '<span class="new">NEW BEST</span>' : '') + '<br>' +
    'さいだいの星 <span class="v">' + LV[maxLvl].name + '</span><br>' +
    'BEST <span class="v">' + best.toLocaleString() + '</span>';
  ui.title.style.display = 'none';
  ui.over.style.display = '';
  ui.overlay.classList.remove('hidden');
  ui.hud.classList.remove('on');
  sfx.over();
}

// ============================================================
// Update & render
// ============================================================
function update(dt) {
  nowT += dt;
  shake = Math.max(0, shake - dt * 40);
  canDropT = Math.max(0, canDropT - dt);

  if (state === 'play') {
    physics(Math.min(dt, 1 / 30));
    // overflow check
    danger = 0;
    let dead = false;
    for (const b of balls) {
      if (b.age > 1.0 && b.y - b.r < by) {
        b.overT += dt;
        danger = Math.max(danger, Math.min(1, b.overT / 1.0));
        if (b.overT > 1.0) dead = true;
      } else b.overT = Math.max(0, b.overT - dt * 2);
    }
    if (dead) gameOver();
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += G * 0.15 * dt;
    p.vx *= 0.97; p.vy *= 0.97;
  }
  for (let i = popups.length - 1; i >= 0; i--) {
    popups[i].t += dt;
    if (popups[i].t > 1) popups.splice(i, 1);
  }
}

function render(now) {
  // bg
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0a18');
  bg.addColorStop(1, '#121226');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#cfe0ff';
  for (const s of stars) {
    ctx.globalAlpha = (0.2 + 0.5 * Math.abs(Math.sin(now * 0.0008 + s.tw))) * s.z;
    ctx.fillRect(s.x, s.y, s.z * 2, s.z * 2);
  }
  ctx.globalAlpha = 1;

  ctx.save();
  if (shake > 0) ctx.translate(rand(-shake, shake), rand(-shake, shake));

  // board container
  ctx.strokeStyle = 'rgba(140,170,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.lineTo(bx, by + bh);
  ctx.lineTo(bx + bw, by + bh);
  ctx.lineTo(bx + bw, by);
  ctx.stroke();
  ctx.fillStyle = 'rgba(120,150,255,0.045)';
  ctx.fillRect(bx, by, bw, bh);

  // danger line
  const dFlash = danger > 0 ? (Math.sin(now * 0.02) > 0 ? 0.9 : 0.4) * danger + 0.2 : 0.22;
  ctx.strokeStyle = 'rgba(255,110,140,' + dFlash + ')';
  ctx.lineWidth = danger > 0 ? 2.5 : 1.5;
  ctx.setLineDash([10, 8]);
  ctx.beginPath();
  ctx.moveTo(bx - u, by);
  ctx.lineTo(bx + bw + u, by);
  ctx.stroke();
  ctx.setLineDash([]);

  if (state === 'play') {
    // aim guide
    const r = LV[curLvl].r * u;
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 8]);
    ctx.beginPath();
    ctx.moveTo(aimX, dropY + r);
    ctx.lineTo(aimX, by + bh);
    ctx.stroke();
    ctx.setLineDash([]);
    // dropper planet (bobs gently)
    const bob = Math.sin(now * 0.004) * u * 0.12;
    ctx.globalAlpha = canDropT > 0 ? 0.45 : 1;
    drawPlanet(curLvl, aimX, dropY + bob, r);
    ctx.globalAlpha = 1;
    // NEXT preview
    const nr = u * 1.1;
    const nx = bx + bw - nr - 4, ny = Math.max(34, by - u * 5.2);
    ctx.font = '700 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(232,236,255,0.5)';
    ctx.fillText('NEXT', nx, ny - nr - 8);
    drawPlanet(nextLvl, nx, ny, nr * (LV[nextLvl].r / LV[2].r) * 0.6 + nr * 0.4);
  }

  // balls
  for (const b of balls) {
    drawPlanet(b.lvl, b.x, b.y, b.r * b.pop, b.rot);
    if (b.lvl === MAXLV) { // pulsing sun glow
      const pg = ctx.createRadialGradient(b.x, b.y, b.r, b.x, b.y, b.r * (1.4 + Math.sin(now * 0.005) * 0.12));
      pg.addColorStop(0, 'rgba(255,210,77,0.3)');
      pg.addColorStop(1, 'rgba(255,210,77,0)');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 1.6, 0, TAU); ctx.fill();
    }
  }

  // particles
  for (const p of particles) {
    const a = p.life / p.maxLife;
    if (p.ring) {
      ctx.strokeStyle = p.col;
      ctx.globalAlpha = a;
      ctx.lineWidth = 3 * a + 0.5;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size + (1 - a) * u * 6, 0, TAU); ctx.stroke();
    } else {
      ctx.globalAlpha = a;
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a + 0.5, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // popups
  ctx.font = '800 ' + Math.max(14, u * 0.85) + 'px sans-serif';
  ctx.textAlign = 'center';
  for (const p of popups) {
    ctx.globalAlpha = 1 - p.t;
    ctx.fillStyle = p.col;
    ctx.fillText(p.txt, p.x, p.y - p.t * u * 2.2);
  }
  ctx.globalAlpha = 1;

  // evolution chart
  const cy = by + bh + Math.max(30, H * 0.038);
  const total = LV.reduce((s, L) => s + L.r, 0);
  const cw = Math.min(W * 0.92, bw + u * 4);
  const gap = Math.max(4, cw * 0.012);
  let k = (cw - (LV.length - 1) * gap) / (2 * total);
  k = Math.min(k, (H - cy) * 0.82 / LV[MAXLV].r, u * 1.15 / LV[MAXLV].r);
  const rowW = 2 * total * k + (LV.length - 1) * gap;
  let cx = (W - rowW) / 2;
  for (let i = 0; i < LV.length; i++) {
    const pr = Math.max(4, LV[i].r * k);
    cx += pr;
    if (i <= maxLvl || state !== 'play') {
      drawPlanet(i, cx, cy, pr);
    } else {
      ctx.fillStyle = 'rgba(140,160,220,0.15)';
      ctx.beginPath(); ctx.arc(cx, cy, pr, 0, TAU); ctx.fill();
    }
    cx += pr + gap;
  }

  ctx.restore();
}

// HUD
let lastHud = 0;
function updateHud(now) {
  if (now - lastHud < 60) return;
  lastHud = now;
  ui.score.textContent = Math.floor(score).toLocaleString();
  ui.best.textContent = 'BEST ' + best.toLocaleString();
}

// ============================================================
// Main loop
// ============================================================
window.addEventListener('resize', layout);
document.addEventListener('visibilitychange', () => {});
layout();
aimX = W / 2;

let lastT = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.08) dt = 0.08;
  update(dt);
  render(now);
  updateHud(now);
}
requestAnimationFrame(frame);

// title ambience: floating planets
setInterval(() => {
  if (state === 'title') {
    const lvl = Math.floor(rand(6));
    burst(rand(W), rand(H * 0.7), 6, LV[lvl].glow, u * 8, u * 0.3);
  }
}, 900);

ui.best.textContent = 'BEST ' + best.toLocaleString();

})();
</script>
