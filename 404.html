<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — ページが見つかりません | DevNull Studio</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#ffffff">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #ffffff; --bg-soft: #f5f5f7;
  --text: #1d1d1f; --text-dim: #6e6e73; --text-mute: #86868b;
  --border: #d2d2d7; --accent: #0071e3; --accent-hov: #0077ed;
}
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 24px; -webkit-font-smoothing: antialiased;
}
.code { font-size: clamp(72px, 16vw, 132px); font-weight: 700; letter-spacing: -0.04em; line-height: 1; color: var(--text); }
.msg { margin-top: 18px; font-size: clamp(15px, 2.4vw, 18px); color: var(--text-dim); line-height: 1.7; }
.home {
  display: inline-block; margin-top: 30px;
  font-size: 15px; font-weight: 500; color: #fff;
  background: var(--accent); border-radius: 980px;
  padding: 12px 28px; text-decoration: none;
  transition: background-color .2s;
}
.home:hover { background: var(--accent-hov); }
</style>
</head>
<body>
<div>
  <div class="code">404</div>
  <div class="msg">お探しのページは見つかりませんでした。<br>移動または削除された可能性があります。</div>
  <a class="home" href="/">ホームに戻る</a>
</div>
</body>
</html>
